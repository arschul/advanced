llows to decide what content to show you</div><div class="di2"><b>b.</b>&ensp;spreading rapidly and widely across the internet</div><div class="di2"><b>c.</b>&ensp;a person who affects others' opinions through social media</div><div class="di2"><b>d.</b>&ensp;to move through content by sliding your finger or cursor</div><div class="di2"><b>e.</b>&ensp;the total time spent looking at a digital device</div><div class="di2"><b>f.</b>&ensp;a voluntary period of avoiding digital devices</div><div class="di2"><b>g.</b>&ensp;to carefully select and organise content for a specific audience</div><div class="di2"><b>h.</b>&ensp;a cycle of trigger, action and reward that makes behaviour automatic</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>algorithm</em>&ensp;·&ensp;<em>viral</em>&ensp;·&ensp;<em>influencer</em>&ensp;·&ensp;<em>scroll</em>&ensp;·&ensp;<em>screen time</em>&ensp;·&ensp;<em>digital detox</em>&ensp;·&ensp;<em>curate</em></div><ol class="exlist"><li>The video had ten million views in 24 hours — it went completely <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">viral</span></span>.<div class="lines"><div></div></div></li><li>Most parents worry about how much <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">screen time</span></span> their children have each day.<div class="lines"><div></div></div></li><li>She carefully <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">curate</span></span>s her feed so she only sees content related to design.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">algorithm</span></span> decides which posts appear at the top of your feed based on past behaviour.<div class="lines"><div></div></div></li><li>After a week without his phone, he felt the <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">digital detox</span></span> had genuinely helped him sleep better.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Replace each informal expression with a precise vocabulary term. Click to reveal.</p><ol class="exlist"><li>'I spent two hours just going through posts on my phone.' → I spent two hours <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">scrolling</span></span> through my feed.<div class="lines"><div></div></div></li><li>'The app is designed to keep you coming back automatically.' → The app exploits a <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">built-in habit loop</span></span>.<div class="lines"><div></div></div></li></ol></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Passive Voice</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Use the passive when the action is more important than the agent, the agent is unknown, or to create formal objectivity.</p><div class="gex"><p>Active: Companies <em>collect</em> your data. → Passive: Your data <strong>is collected</strong>.</p><p>Structure: <strong>be + past participle</strong> (+ by + agent only when agent matters)</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Rewrite in the passive. Click the blank to reveal.</p><ol class="exlist"><li>Engineers design algorithms to maximise engagement. → Algorithms <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">are designed to maximise engagement</span></span>.<div class="lines"><div></div></div></li><li>The company stored personal data on servers overseas. → All personal data <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">was stored on servers overseas</span></span>.<div class="lines"><div></div></div></li><li>Advertisers target users based on browsing history. → Users <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">are targeted based on their browsing history</span></span>.<div class="lines"><div></div></div></li><li>The government has not yet regulated social media. → Social media platforms <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">have not yet been regulated</span></span>.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct the passive error. Click the arrow to reveal.</p><ol class="exlist"><li>The algorithm was design to keep you online as long as possible.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ was designed</span></span><div class="lines"><div></div></div></li><li>This data is collect automatically without the user's knowledge.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ is collected</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Rewrite this paragraph formally — convert at least FOUR active sentences to passive. Compare with a partner: does the tone change?</p><div class="rtext short-r"><p>Social media companies collect enormous amounts of personal data. They use this information to create targeted advertising. Researchers have shown this influences purchasing decisions significantly. Governments are beginning to challenge these practices.</p></div><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Attention Economy</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> How many times do you estimate you checked your phone yesterday? What were you hoping to find?</div><div class="rtext"><div class="rtitle">The Attention Economy</div><p>In the early days of the internet, the dominant metaphor was the library: a vast repository of information available to anyone with the curiosity to search. That metaphor no longer applies. Today's internet is better described as a casino — an environment designed not to inform, but to capture and hold attention for as long as possible.</p><p>As social media platforms grew, their business models became dependent on advertising revenue, which in turn depended on engagement. This created a powerful commercial incentive to make platforms as addictive as possible. Designers adopted techniques from behavioural psychology: infinite scroll eliminates natural stopping points; variable rewards — the unpredictable appearance of interesting content — exploit the same neurological mechanisms as slot machines.</p><p>Critics argue the consequences extend far beyond wasted time. Sustained exposure appears to reshape cognitive habits: the ability to read deeply, concentrate for extended periods, and think through complex problems without distraction. The irony is that these platforms present themselves as tools for connection. In practice, many users report feeling simultaneously over-stimulated and profoundly alone. The attention economy sells the feeling of being connected while eroding the conditions necessary for real connection.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What metaphor does the author use for the modern internet, and why is it more accurate than the library metaphor?<div class="lines"><div></div><div></div><div></div></div></li><li>Name two specific design features and explain how each works psychologically.<div class="lines"><div></div><div></div><div></div></div></li><li>What is the central irony the author identifies in the final paragraph?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Casino: designed to capture attention not inform 2-Any two: infinite scroll (removes stopping points) / variable rewards (triggers dopamine) 3-Platforms sell connection but erode conditions for real connection</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>a large stored collection (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">repository</span></span><div class="lines"><div></div></div></li><li>gradually destroying or wearing away (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">eroding</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The author says platforms "sell the feeling of being connected while eroding the conditions for real connection." What exactly does this mean? Do you agree? Write 4–5 sentences.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Opinion Paragraph</div><div class="sb"><div class="pbox">Social media does more harm than good for teenagers. Do you agree or disagree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Position</strong>State your view in the first sentence. Avoid starting with 'I think…'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Reasons</strong>Two reasons, or one reason + a counterargument you address<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Example</strong>A real or plausible example that makes your argument concrete<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Social media is largely…, particularly for…</span><span>One significant concern is that…</span><span>While some argue that…, the evidence suggests…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>The most damaging aspect is not…but rather…</span><span>This is not simply a question of willpower; it is structural.</span></div></div><p class="wc-note">Target: 180–220 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Reading + Question Set</div><div class="sb"><span class="tbadge">Reading Comprehension</span><div class="rtext short-r"><p>Digital platforms affect cognitive development in ways researchers are only beginning to understand. When users constantly switch between tasks and notifications, they train the brain to prefer short, fragmented bursts of information. This pattern, known as continuous partial attention, may interfere with the neural pathways associated with deep learning. Not all effects are negative, however. Platforms promoting creative production — video editing or digital art — appear to build problem-solving skills. The critical variable may not be whether adolescents use technology, but how they use it.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Identify the type and answer. Click to reveal.</p><ol class="exlist"><li>What does the passage say 'continuous partial attention' involves? <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Factual</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Switching between tasks; preferring short fragmented info</span></span><div class="lines"><div></div></div></li><li>The word 'fragmented' most nearly means: a) brief b) broken into pieces c) unpleasant d) fast-moving → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">b</span></span>  <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Vocabulary</span></span></em><div class="lines"><div></div></div></li><li>What can be inferred about the author's overall view of technology? → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">c: Effects depend on how it is used</span></span>  <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Inference</span></span></em><div class="lines"><div></div></div></li><li>Why does the author mention video editing and digital art? → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose: to show technology can have positive cognitive effects</span></span>  <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose</span></span></em><div class="lines"><div></div></div></li></ol></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Technology & Social Media</div><div class="sb"><div class="spq"><ol class="exlist"><li>Would you delete all your social media for a week if paid? What would be hardest to give up?</li><li>Do algorithms help you discover new things, or trap you in a bubble?</li><li>Is the way you present yourself online an honest version of who you are?</li></ol></div><div class="game-box"><p class="game-name">Pitch Your App</p><p class="game-desc">Work in groups of 3. Design a social media app that is genuinely good for teenagers: a name, a clear purpose, one unique feature, one built-in protection against addiction. Present in 60 seconds. Class votes: most useful AND most likely to actually be used.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 6 — Music & Creativity</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 6 — Music & Creativity</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Music & Creativity</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>lyrics</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>melody</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>rhythm</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>catchy</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>composition</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>collaborate</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>set the mood</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>ahead of its time</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;the words of a song</div><div class="di2"><b>b.</b>&ensp;the main tune or sequence of notes in a piece of music</div><div class="di2"><b>c.</b>&ensp;a regular repeated pattern of sound or beats</div><div class="di2"><b>d.</b>&ensp;pleasant and very easy to remember — said of a tune or song</div><div class="di2"><b>e.</b>&ensp;a piece of music created by a composer</div><div class="di2"><b>f.</b>&ensp;to work with others to create something together</div><div class="di2"><b>g.</b>&ensp;to create a particular atmosphere or emotional feeling</div><div class="di2"><b>h.</b>&ensp;too original to be fully appreciated when first created</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>lyrics</em>&ensp;·&ensp;<em>melody</em>&ensp;·&ensp;<em>catchy</em>&ensp;·&ensp;<em>composition</em>&ensp;·&ensp;<em>collaborate</em>&ensp;·&ensp;<em>set the mood</em></div><ol class="exlist"><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">melody</span></span> was so <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">catchy</span></span> that I couldn't stop humming it for days.<div class="lines"><div></div></div></li><li>Two respected jazz musicians agreed to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">collaborate</span></span> on a new album.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">lyrics</span></span> to that song are deeply personal — she wrote them after losing someone close.<div class="lines"><div></div></div></li><li>Slow, classical music tends to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">set the mood</span></span> for studying better than anything with heavy bass.<div class="lines"><div></div></div></li><li>That <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">composition</span></span> was written when the artist was only nineteen — his most celebrated work.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Explain the difference between these pairs in one precise sentence each. Click to reveal.</p><ol class="exlist"><li><em>melody</em> vs. <em>rhythm</em>: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Melody is a sequence of notes you can sing; rhythm is the underlying beat pattern.</span></span><div class="lines"><div></div></div></li><li><em>lyrics</em> vs. <em>composition</em>: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Lyrics are the words of a song; a composition is the complete musical work.</span></span><div class="lines"><div></div></div></li></ol></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · First Conditional + Variations</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Use the first conditional for real, likely possibilities. Vary the connector to add nuance.</p><div class="gex"><p><strong>If + present, will + base</strong>: <em>If I listen to music, I concentrate better.</em></p><p><strong>Unless</strong> (= if not): <em>Unless the lyrics are meaningful, I won't enjoy the song.</em></p><p><strong>As long as</strong>: <em>As long as the beat is right, I can work for hours.</em></p><p><strong>Provided that</strong> (formal): <em>Provided that we rehearse enough, the concert will succeed.</em></p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete with the correct form. Click to reveal.</p><ol class="exlist"><li>If she <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">practises</span></span> (practise) every day, she will be ready for the audition.<div class="lines"><div></div></div></li><li>Unless we <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">find</span></span> (find) a bassist, the band <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">won't be able</span></span> (not/be able) to perform.<div class="lines"><div></div></div></li><li>As long as the sound quality <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">is</span></span> (be) good, the audience <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">will enjoy</span></span> (enjoy) the show.<div class="lines"><div></div></div></li><li>Provided that the songwriter <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">agrees</span></span> (agree), we <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">will use</span></span> (use) the track in the film.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Rewrite using the connector in brackets. Click to reveal.</p><ol class="exlist"><li>'If you don't have a backup, you'll lose all your recordings.' (unless) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Unless you have a backup, you'll lose all your recordings.</span></span><div class="lines"><div></div></div></li><li>'You can use my guitar if you return it carefully.' (as long as) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">You can use my guitar as long as you return it carefully.</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write four sentences about music, creativity or learning — one using each connector: <em>if / unless / as long as / provided that</em>.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · Why Music Gives You Chills</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Has a piece of music ever given you chills or made you feel something unexpectedly intense?</div><div class="rtext"><div class="rtitle">Why Music Gives You Chills</div><p>You are listening to music — perhaps a score building to its climax, or a voice suddenly hitting a perfect note — and something physical happens. The hairs on your arms rise. A wave of warmth passes across your chest. You feel the impulse to cry, though you are not sad. This experience, known as <em>frisson</em>, is one of the most intensely pleasurable responses the human brain can produce.</p><p>Researchers estimate that roughly half of all people experience frisson regularly. Those who are more open to new experiences and emotionally imaginative are significantly more likely to report chills from music. The response is linked not to musical training but to how a person engages with sound at a cognitive level.</p><p>Neuroscientists have found that peak emotional responses to music trigger the release of dopamine — the chemical involved in pleasure and reward. The brain creates these peaks by simultaneously predicting and violating its own expectations. A chord that resolves unexpectedly, a melody that soars higher than anticipated, a sudden silence before a crescendo — moments of beautiful surprise trigger the physical response. Music is also deeply tied to memory: a song associated with a particular moment can recreate the emotional state of that moment with remarkable accuracy, remaining vivid for decades.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What is frisson, and what physical sensations does it involve?<div class="lines"><div></div><div></div><div></div></div></li><li>What type of person is more likely to experience frisson, according to the text?<div class="lines"><div></div><div></div><div></div></div></li><li>Explain how the brain creates peak emotional responses to music.<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Frisson: hairs rising, warmth, impulse to cry 2-Open to new experiences, emotionally imaginative 3-Brain predicts then violates expectations, triggering dopamine release</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>the point of highest intensity in a musical piece (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">climax</span></span><div class="lines"><div></div></div></li><li>a gradual increase in loudness in music (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">crescendo</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The text says music creates pleasure by "predicting and violating expectations." Think of a moment in a song where this happens. Describe it. Does the scientific explanation make the experience less magical or more interesting? Write 4–5 sentences.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Short Essay</div><div class="sb"><div class="pbox">Choose ONE: A) What role does music play in your life?  OR  B) Music is more powerful than language for expressing emotion. Do you agree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Focus / Position</strong>Central idea in one sentence. Specific, not vague.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Reason + Example</strong>What supports your focus? Be concrete.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Closing thought</strong>Final sentence that does NOT simply repeat the opening.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Music has always been…</span><span>A song can convey…in a way that words alone cannot.</span><span>The connection between music and…is well established.</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>What distinguishes music from language is…</span><span>Rather than merely expressing emotion, music appears to…</span></div></div><p class="wc-note">Target: 200–240 words. Include at least one phrase from today's vocabulary.</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><div class="rtext short-r"><p>Music has long been used in advertising to influence consumer behaviour. Advertisers select music carefully to match the mood they want to create around a product. A fast, energetic soundtrack makes a car feel exciting; slow classical music makes a perfume seem sophisticated. Psychologists have shown that background music in shops increases spending when the tempo matches the target demographic.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">How does the lecture relate to the reading? Where do they agree, or where does one extend the other?</div><ul class="chk"><li><span class="cb"></span>I referenced a specific point from the reading.</li><li><span class="cb"></span>I referenced a specific point from the lecture.</li><li><span class="cb"></span>I used at least two reporting verbs.</li><li><span class="cb"></span>I connected the ideas rather than describing each source separately.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Music & Creativity</div><div class="sb"><div class="spq"><ol class="exlist"><li>Can you describe a song that has a powerful emotional effect on you? What do you think causes that reaction?</li><li>Does your music taste reveal something genuine about your personality?</li><li>If you could only keep music from one decade for the rest of your life, which would you choose?</li></ol></div><div class="game-box"><p class="game-name">Explain Your Playlist</p><p class="game-desc">Each student describes 3 songs they listen to regularly. For each: what mood you're in when you play it, what memory or emotion it triggers, and what you think it's really about at a deeper level. Partner asks one genuine follow-up question after all three songs.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 7 — Health & Wellbeing</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 7 — Health & Wellbeing</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Health & Wellbeing</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>symptom</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>treatment</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>exhaustion</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>remedy</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>nutrition</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>well-being</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>fitness routine</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>take a toll on</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a sign that something may be wrong with your health</div><div class="di2"><b>b.</b>&ensp;medical care given to someone who is ill or injured</div><div class="di2"><b>c.</b>&ensp;extreme physical or mental tiredness</div><div class="di2"><b>d.</b>&ensp;a treatment or solution that relieves a health problem</div><div class="di2"><b>e.</b>&ensp;getting the right kinds of food and drink for good health</div><div class="di2"><b>f.</b>&ensp;a general state of being healthy, comfortable and content</div><div class="di2"><b>g.</b>&ensp;a regular, structured programme of physical exercise</div><div class="di2"><b>h.</b>&ensp;to cause gradual damage or harmful effect over time</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>symptom</em>&ensp;·&ensp;<em>exhaustion</em>&ensp;·&ensp;<em>remedy</em>&ensp;·&ensp;<em>well-being</em>&ensp;·&ensp;<em>fitness routine</em>&ensp;·&ensp;<em>take a toll on</em>&ensp;·&ensp;<em>mental health</em></div><ol class="exlist"><li>One common <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">symptom</span></span> of burnout is difficulty concentrating, even on simple tasks.<div class="lines"><div></div></div></li><li>Poor nutrition can <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">take a toll on</span></span> your immune system, leaving you vulnerable to illness.<div class="lines"><div></div></div></li><li>Her <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">fitness routine</span></span> includes a 30-minute run every morning and yoga three times a week.<div class="lines"><div></div></div></li><li>There is no simple <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">remedy</span></span> for chronic stress — it requires lasting lifestyle changes.<div class="lines"><div></div></div></li><li>After three nights with little sleep, she was experiencing complete <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">exhaustion</span></span>.<div class="lines"><div></div></div></li><li>Schools increasingly recognise that students' <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">mental health / well-being</span></span> is as important as exam results.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose THREE words from today's list. For each, write a specific and realistic sentence — not a dictionary definition.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Present Perfect vs. Past Simple</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Key rule: use Past Simple with a SPECIFIC TIME. Use Present Perfect with NO specific time, or when the result matters now.</p><div class="gex"><p><strong>Past Simple</strong> (specific time): I <em>went</em> to the gym <u>yesterday</u>.</p><p><strong>Present Perfect</strong> (experience, no time): <em>Have</em> you ever <em>tried</em> meditation?</p><p><strong>Present Perfect</strong> (ongoing result): I <em>have been feeling</em> exhausted <u>lately</u>.</p><p><strong>Error</strong>: ✗ I <em>have started</em> exercising <u>last month</u>. ✓ I <em>started</em> last month.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Choose the correct form and write WHY. Click to reveal.</p><ol class="exlist"><li>She <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">recovered</span></span> (has recovered / recovered) from her injury three weeks ago. Why: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">specific time: three weeks ago</span></span><div class="lines"><div></div></div></li><li>I <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">have never tried</span></span> (have never tried / never tried) acupuncture, but I'm curious. Why: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">experience, no specific time</span></span><div class="lines"><div></div></div></li><li>He <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">has been feeling</span></span> (has been feeling / felt) unusually tired since starting the new medication. Why: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">ongoing since a point</span></span><div class="lines"><div></div></div></li><li>They <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">introduced</span></span> (have introduced / introduced) a wellbeing programme last September. Why: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">specific time: last September</span></span><div class="lines"><div></div></div></li><li>Research <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">has shown</span></span> (has shown / showed) that sleep deprivation affects memory. Why: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">general finding, result matters now</span></span><div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct the tense error. Click to reveal.</p><ol class="exlist"><li>Did you ever have a really consistent fitness routine?<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ Have you ever had</span></span><div class="lines"><div></div></div></li><li>I have started taking vitamins last winter and felt much better.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ I started taking vitamins last winter</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write a health-related paragraph (5–6 sentences): something you STARTED at a specific past time (PS), a habit you HAVE KEPT until now (PP), and something you HAVE NEVER TRIED but want to (PP). Underline each verb and label it PS or PP.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Student Sleep Crisis</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> How many hours did you sleep last night? How did that affect how you felt today?</div><div class="rtext"><div class="rtitle">The Student Sleep Crisis</div><p>Ask most secondary school students what time they went to sleep, and the answer is likely to be well past midnight. What is striking is not simply that teenagers are tired — they always have been — but that the consequences of this sleep deficit are far more serious than most people recognise.</p><p>Sleep is not passive rest. During deep sleep, the brain consolidates memories by transferring information from short-term to long-term storage. Students who sleep fewer than seven hours before a test perform significantly worse than peers who sleep eight hours, even when both groups spent the same amount of time studying. The implication is stark: sleep is not what you sacrifice to study more — it is part of studying.</p><p>The emotional consequences are equally significant. Sleep deprivation is associated with increased anxiety, reduced emotional regulation and heightened sensitivity to social rejection. The brain's prefrontal cortex — responsible for rational thought and impulse control — is disproportionately affected by lack of sleep.</p><p>One structural problem is school start times. Adolescent biology causes a natural shift in the sleep-wake cycle, making teenagers genuinely unable to feel tired until later at night. Several countries have piloted later start times, with early results showing improvements in attendance, performance and reported well-being.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What happens in the brain during deep sleep, according to the text?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author argue is wrong with sacrificing sleep to study more?<div class="lines"><div></div><div></div><div></div></div></li><li>What structural solution does the text mention, and what were its early results?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Memory consolidation: info moves from short-term to long-term storage 2-Students who sleep less perform worse even with equal study time; sleep IS part of studying 3-Later school start times; improved attendance, performance, well-being</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>strengthens and makes more stable (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">consolidates</span></span><div class="lines"><div></div></div></li><li>more than would be expected (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">disproportionately</span></span><div class="lines"><div></div></div></li><li>tested on a small scale before wider use (§4): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">piloted</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The author states "sleep is not what you sacrifice to study more — it is part of studying." How does this challenge common beliefs about effort and productivity? Write 4–5 sentences.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Problem-Solution Paragraph</div><div class="sb"><div class="pbox">Identify one health problem common among teenagers and suggest two practical solutions.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Problem + cause</strong>What is the health problem? What specifically causes it for teenagers?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Solution 1</strong>What is it? How does it directly address the problem?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Solution 2 + Impact</strong>A second solution from a different angle. Why does addressing this matter?<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>One of the most common health issues among teenagers is…</span><span>This problem is largely caused by…</span><span>A practical first step would be to…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>The root cause is not simply…but rather a structural issue involving…</span><span>Addressing this requires both individual behaviour change and…</span></div></div><p class="wc-note">Target: 180–220 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Independent Speaking Task</div><div class="sb"><span class="tbadge">Independent Speaking Task</span><p class="exinst">Choose ONE prompt. Prepare <strong>15 seconds</strong>. Speak <strong>45 seconds</strong>. Record your response.</p><div class="pbox">Prompt A: Should schools spend more time on student mental health than on academic content?</div><div class="pbox">Prompt B: What is the most important change a person can make to improve their physical health?</div><p class="exlabel">Notes (keywords only)</p><div class="notes-box"><div></div><div></div><div></div></div><p class="exlabel">Peer Feedback Checklist</p><ul class="chk"><li><span class="cb"></span>Main point was clear in the first sentence.</li><li><span class="cb"></span>At least one specific reason was given.</li><li><span class="cb"></span>A concrete example or personal detail was included.</li><li><span class="cb"></span>No long filler sequences (um, like, so, basically…).</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Health & Wellbeing</div><div class="sb"><div class="spq"><ol class="exlist"><li>How seriously do you take your own health? Is there a gap between what you know is healthy and what you actually do?</li><li>Do you think schools do enough to address student mental health? What would you change?</li><li>If you could only keep one healthy habit for the rest of your life, what would it be?</li></ol></div><div class="game-box"><p class="game-name">Health Myth Busters</p><p class="game-desc">Your teacher reads 5 health claims. As a group: TRUE, FALSE, or IT DEPENDS — defend your answer for 20 seconds. 1) You need 8 glasses of water a day. 2) Eating after 9pm makes you gain weight. 3) Exercising every day is always better than resting. 4) Teenagers need more sleep than adults. 5) Mental health problems are less serious than physical ones.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 8 — TOEFL Simulation Day</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 8 — TOEFL Simulation Day</h2><p class="dnote">Full mid-course simulation. Work individually under timed conditions.</p></div><div class="tday-banner"><div class="tblbl">Full TOEFL Simulation</div><p>Complete each section individually. No dictionaries. No phones except for recording speaking responses.</p></div><div class="tgrid"><div class="tphase"><h3>Reading</h3><p class="tpdesc">Full TOEFL Reading section</p><ul><li>Two academic reading passages (~700 words each)</li><li>10 questions per passage</li><li>Types: factual, inference, vocabulary in context, summary</li><li>Individual timed conditions</li></ul></div><div class="tphase"><h3>Listening + Speaking</h3><p class="tpdesc">Full TOEFL Listening & Speaking sections</p><ul><li>Listening: campus conversation + academic lecture</li><li>Speaking Task 1: Independent (personal preference)</li><li>Speaking Task 2: Integrated — read + listen → respond</li><li>Record spoken responses on your phone</li></ul></div><div class="tphase"><h3>Writing</h3><p class="tpdesc">Full TOEFL Writing section</p><ul><li>Integrated Writing: read + listen → 150–225 words</li><li>Independent Writing: ~300 words</li><li>Clear thesis, logical paragraphs, specific examples</li></ul></div><div class="tphase"><h3>Debrief</h3><p class="tpdesc">Verbal debrief — no formal corrections</p><ul><li>Which section felt hardest? Which felt most improved?</li><li>Where did you lose time? What would you change?</li><li>Identify ONE pattern to work on before Day 17</li></ul></div></div>`,
`<div class="ph-hd"><strong>Day 9 — Nature & Environment</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 9 — Nature & Environment</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Nature & Environment</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>habitat</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>biodiversity</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>conservation</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>ecosystem</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>deforestation</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>extinction</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>carbon footprint</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>at risk</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;the natural environment where an animal or plant normally lives</div><div class="di2"><b>b.</b>&ensp;the variety of living species within a particular environment</div><div class="di2"><b>c.</b>&ensp;the protection of nature, wildlife and the environment</div><div class="di2"><b>d.</b>&ensp;a community of living things interacting with their environment</div><div class="di2"><b>e.</b>&ensp;large-scale removal or destruction of forests</div><div class="di2"><b>f.</b>&ensp;the permanent disappearance of a species from the Earth</div><div class="di2"><b>g.</b>&ensp;total greenhouse gas emissions caused by a person, company or activity</div><div class="di2"><b>h.</b>&ensp;in danger of being harmed, lost or destroyed</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>habitat</em>&ensp;·&ensp;<em>biodiversity</em>&ensp;·&ensp;<em>conservation</em>&ensp;·&ensp;<em>ecosystem</em>&ensp;·&ensp;<em>deforestation</em>&ensp;·&ensp;<em>extinction</em>&ensp;·&ensp;<em>at risk</em></div><ol class="exlist"><li>The Amazon is home to more species of plant and animal than any other region on Earth — remarkable <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">biodiversity</span></span>.<div class="lines"><div></div></div></li><li>Once lost to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">extinction</span></span>, a species is gone permanently — there is no recovering it.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">ecosystem</span></span> of the wetland has been severely damaged by pollution from nearby factories.<div class="lines"><div></div></div></li><li>Reducing <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">deforestation</span></span> in tropical regions is one of the most effective climate strategies available.<div class="lines"><div></div></div></li><li>Several species of sea turtle are currently <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">at risk</span></span> due to plastic pollution and overfishing.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose two words from today's list that people often confuse. Write one sentence for each that makes the precise meaning unmistakably clear, and one deliberately incorrect usage for a partner to correct.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Reduced Relative Clauses</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Remove 'who/which/that + be', or replace 'who/which/that + active verb' with the –ing form. Common in academic writing.</p><div class="gex"><p>Full: Animals <em>that live</em> in polar regions face habitat loss. → Reduced: Animals <strong>living</strong> in polar regions…</p><p>Full: Species <em>that have been affected</em> by deforestation struggle. → Reduced: Species <strong>affected</strong> by deforestation…</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Reduce each relative clause. Click to reveal.</p><ol class="exlist"><li>Plants that grow in dry conditions have developed water-storage systems. → Plants <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">growing</span></span> in dry conditions…<div class="lines"><div></div></div></li><li>The scientists who are studying coral bleaching have published results. → Scientists <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">studying</span></span> coral bleaching…<div class="lines"><div></div></div></li><li>Animals that are threatened by rising sea temperatures include polar bears. → Animals <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">threatened</span></span> by rising sea temperatures…<div class="lines"><div></div></div></li><li>Many species that were once common have disappeared from the region. → Many species <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">once common</span></span> have disappeared…<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Correct or error? Click to reveal.</p><ol class="exlist"><li>Animals lived in cold climates developed thicker fur over generations.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ living (not 'lived')</span></span><div class="lines"><div></div></div></li><li>The ecosystem damaging by pollution requires decades to recover.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ damaged (not 'damaging')</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write THREE original sentences about the environment — one with active (-ing), one with passive (-ed), and one where 'that + be' is simply removed. Underline and label each reduced clause.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Urban Wild</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Do you have much contact with nature in your daily life? Does this matter to you?</div><div class="rtext"><div class="rtitle">The Urban Wild</div><p>Cities are not, by definition, natural spaces. They are designed for human convenience. And yet, as ecologists and planners are increasingly recognising, cities that ignore the natural world do so at their own peril.</p><p>Green spaces — parks, gardens and tree-lined streets — act as corridors that allow wildlife to move through what would otherwise be an impenetrable barrier of concrete and glass. A city with connected green spaces supports significantly higher numbers of bird, insect and plant species than one where green areas are isolated and fragmented. Pollinators such as bees, essential to food production, depend on this urban biodiversity to survive.</p><p>The benefits extend to human health. Research consistently shows that access to green spaces reduces cortisol — the primary stress hormone — and is associated with lower rates of anxiety, depression and cardiovascular disease. In cities where green spaces are concentrated in wealthier areas, these benefits are distributed unequally — what some researchers call a 'green gap'.</p><p>The trend in progressive city planning is increasingly towards 'rewilding' — the deliberate reintroduction of native plants and animals into urban spaces. Singapore has integrated forest corridors into its architecture. In several European cities, rivers buried underground in the 20th century are being reopened, restoring aquatic ecosystems while reducing flood risk simultaneously. The urban wild is not a luxury. It is infrastructure.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What specific function do connected green spaces serve for wildlife in cities?<div class="lines"><div></div><div></div><div></div></div></li><li>What is the 'green gap', and why is it a concern?<div class="lines"><div></div><div></div><div></div></div></li><li>What does 'rewilding' mean, and what examples does the text give?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Act as corridors allowing wildlife movement through cities 2-Green space benefits concentrated in wealthy areas; unequal health outcomes 3-Reintroducing native species into cities; Singapore (forest corridors), European cities (reopening rivers)</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>impossible to pass through (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">impenetrable</span></span><div class="lines"><div></div></div></li><li>split into disconnected parts (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">fragmented</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The final sentence — "The urban wild is not a luxury. It is infrastructure." — makes a bold rhetorical claim. What does it mean? Is it effective as a conclusion? Write 3–4 sentences evaluating this rhetorical choice.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Persuasive Paragraph</div><div class="sb"><div class="pbox">Governments should do more to protect endangered species. Do you agree or disagree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Claim</strong>Your position in one clear sentence.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Warrant + Example</strong>WHY is your claim true? + A real or plausible specific example.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Impact</strong>Why does this matter beyond just this example?<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Government intervention is essential because…</span><span>Without active protection, species affected by… will…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>The case for stronger protection rests not merely on ethical grounds, but on…</span><span>Biodiversity loss represents not just an ecological but also an economic concern.</span></div></div><p class="wc-note">Target: 200–240 words. Include at least one reduced relative clause from today's grammar.</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><div class="rtext short-r"><p>Marine Protected Areas (MPAs) are designated ocean zones where human activity is restricted to allow ecosystems to recover. Research shows that well-enforced MPAs lead to significant increases in fish populations. Supporters argue MPAs are one of the most cost-effective tools for protecting marine biodiversity. Several island nations establishing MPAs covering over 30% of surrounding waters have reported measurable improvements in coral reef health within five years.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">How does the lecture support, challenge or complicate the reading's claims? Use specific details from both.</div><ul class="chk"><li><span class="cb"></span>I mentioned a specific point from the reading.</li><li><span class="cb"></span>I mentioned a specific point from the lecture.</li><li><span class="cb"></span>I explained the relationship between the two sources.</li><li><span class="cb"></span>I used reporting verbs to attribute ideas correctly.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Nature & Environment</div><div class="sb"><div class="spq"><ol class="exlist"><li>How connected do you feel to the natural world? Does living in a city change this?</li><li>Is it primarily the individual's or the government's responsibility to address environmental problems?</li><li>Would you significantly reduce your carbon footprint if it required a major lifestyle change?</li></ol></div><div class="game-box"><p class="game-name">Save This Ecosystem</p><p class="game-desc">Work in groups of 3. Each group is assigned: A — Amazon rainforest. B — Arctic ice cap. C — Great Barrier Reef. You have 3 minutes to plan: main threat, your strategy, who must act. Present in 90 seconds. Class votes: most convincing AND most realistic.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 10 — Travel & Adventure</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 10 — Travel & Adventure</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Travel & Adventure</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>destination</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>itinerary</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>culture shock</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>accommodation</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>landmark</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>jet lag</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>off the beaten path</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>broaden your horizons</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;the place you are travelling to</div><div class="di2"><b>b.</b>&ensp;a detailed plan or schedule for a journey</div><div class="di2"><b>c.</b>&ensp;confusion or anxiety when experiencing a very different culture</div><div class="di2"><b>d.</b>&ensp;a place to stay, such as a hotel, hostel or homestay</div><div class="di2"><b>e.</b>&ensp;a well-known, easily recognisable building or place</div><div class="di2"><b>f.</b>&ensp;tiredness caused by crossing multiple time zones</div><div class="di2"><b>g.</b>&ensp;in a location not well known or frequently visited by tourists</div><div class="di2"><b>h.</b>&ensp;to expand your experience, knowledge and understanding</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>destination</em>&ensp;·&ensp;<em>itinerary</em>&ensp;·&ensp;<em>culture shock</em>&ensp;·&ensp;<em>accommodation</em>&ensp;·&ensp;<em>landmark</em>&ensp;·&ensp;<em>jet lag</em>&ensp;·&ensp;<em>broaden your horizons</em></div><ol class="exlist"><li>After a 14-hour flight to Tokyo, she felt the full effects of <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">jet lag</span></span> for three days.<div class="lines"><div></div></div></li><li>We booked budget <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">accommodation</span></span> in a hostel — clean and convenient.<div class="lines"><div></div></div></li><li>Instead of following a rigid <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">itinerary</span></span>, they decided to explore spontaneously.<div class="lines"><div></div></div></li><li>She experienced genuine <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">culture shock</span></span> when she first moved to Japan — the social customs were completely different.<div class="lines"><div></div></div></li><li>If you travel to genuinely experience other cultures rather than just collect photos, you <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">broaden your horizons</span></span>.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write two sentences: one using <em>off the beaten path</em> and one using <em>broaden your horizons</em>. Each should describe a real or imagined travel experience — not just define the phrase.</p><div class="lines"><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Reported Speech</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Reported Speech</p><div class="gex"><p>Direct: 'The hotel <em>is</em> fantastic.' → Reported: She said the hotel <strong>was</strong> fantastic.</p><p>Direct: 'I <em>will</em> arrive tomorrow.' → Reported: He said he <strong>would</strong> arrive the next day.</p><p><em>say</em> (no object) vs. <em>tell someone</em> (always needs an object): He <em>said</em> it was good. / He <em>told me</em> it was good.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>'The journey takes about four hours.' (She said…) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">She said the journey took about four hours.</span></span><div class="lines"><div></div></div></li><li>'You must try the night market.' (He told me…) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">He told me I had to try the night market.</span></span><div class="lines"><div></div></div></li><li>'I have never seen anything like it.' (She said…) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">She said she had never seen anything like it.</span></span><div class="lines"><div></div></div></li><li>'Will you be coming back tomorrow?' (He asked her…) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">He asked her if she would be coming back the next day.</span></span><div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>She said me that the view from the summit was extraordinary.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ She told me that…</span></span><div class="lines"><div></div></div></li><li>They said they will visit the ruins the following morning.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ …they would visit…</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Report a real or imagined conversation between a traveller and a local guide. Must include: a recommendation, a warning, and a question. Write 5–6 sentences in reported speech.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · What Travel Does to Your Brain</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Have you ever felt like a different person in a different city or country? What caused that feeling?</div><div class="rtext"><div class="rtitle">What Travel Does to Your Brain</div><p>Travel has been romanticised for centuries as a path to self-discovery. In recent years, neuroscientists and psychologists have begun to examine these claims rigorously — and have largely found them to be well-founded.</p><p>When you enter an unfamiliar environment, your brain enters a heightened state of attentiveness. Freed from automatic routines, it must actively process information it would normally filter out: street signs in an unfamiliar language, social customs that seem counterintuitive, food that tastes unlike anything before. This increased engagement appears to strengthen neural connections and improve flexible thinking.</p><p>Research has also shown that people who spend time in foreign cultures develop what psychologists call <em>integrative complexity</em> — the ability to hold multiple, sometimes contradictory perspectives simultaneously. This is strongest in individuals who do not merely observe a culture as tourists, but actively engage with it. The depth of engagement, not the distance travelled, is what produces cognitive change.</p><p>There are limits to these benefits. Research found that the positive effects of travel depend on whether the traveller is genuinely open to the foreign culture — or whether they experience it as entertainment, viewed from behind the safety of a tour bus window.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>Why does the brain work harder in unfamiliar environments?<div class="lines"><div></div><div></div><div></div></div></li><li>What is 'integrative complexity', and when is it most likely to develop?<div class="lines"><div></div><div></div><div></div></div></li><li>What condition does research place on the benefits of travel?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Can't rely on automatic routines; must actively process unfamiliar information 2-Ability to hold contradictory perspectives; develops through deep cultural engagement 3-The traveller must be genuinely open, not just observing as a tourist</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>thorough and careful (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">rigorously</span></span><div class="lines"><div></div></div></li><li>seeming to go against common sense (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">counterintuitive</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text. Use evidence from the text and your own experience.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Describe the best place you have ever be…</div><div class="sb"><div class="pbox">Describe the best place you have ever been — or a place you desperately want to visit. Persuade your reader to go.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Opening hook</strong>A sensory detail or unexpected fact. NOT: 'I want to tell you about…'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>What makes it special</strong>Specific, not generic. Not 'It's beautiful and there's lots to do.'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Practical recommendation + honest tip</strong>One concrete thing to do, and one thing most guides won't mention.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>What strikes most visitors first is…</span><span>I'd strongly recommend going to…</span><span>The one thing most guides don't mention is…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>What sets [place] apart from similar destinations is…</span><span>Rather than following the standard tourist route, consider…</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><p class="exinst">Read in 90 seconds. Teacher reads an account. Take notes. Speak 60 seconds.</p><div class="rtext short-r"><p>Solo travel has grown significantly among young adults. Proponents argue it forces individuals to become more resourceful, confident and socially adaptable. Without a companion to share decisions, the solo traveller develops problem-solving skills and a higher tolerance for uncertainty. Studies suggest solo travellers report greater satisfaction with their trips than group travellers, despite greater practical challenges.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">Explain how the account confirms or complicates the reading's claims. Use specific details from both.</div><ul class="chk"><li><span class="cb"></span>I mentioned a specific point from the reading.</li><li><span class="cb"></span>I mentioned a specific point from the account.</li><li><span class="cb"></span>I explained whether the account confirms, challenges or extends the reading.</li><li><span class="cb"></span>I used reporting verbs.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Travel & Adventure</div><div class="sb"><div class="spq"><ol class="exlist"><li>Would you rather plan every detail of a trip in advance, or leave everything open? What does your preference reveal?</li><li>Has travel ever challenged something you believed about the world?</li><li>If money were no obstacle, where exactly would you go and why? Be specific.</li></ol></div><div class="game-box"><p class="game-name">Culture Shock Stories</p><p class="game-desc">Share (or invent) a funny, embarrassing or surprising travel moment. Use narrative tenses from Day 2. Your story must last at least 45 seconds. Audience asks one follow-up question. Vote: most relatable AND most surprising.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 11 — Science & Discoveries</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 11 — Science & Discoveries</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Science & Discoveries</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>theory</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>hypothesis</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>experiment</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>evidence</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>breakthrough</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>observation</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>shed light on</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>pave the way for</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a well-tested explanation for a
