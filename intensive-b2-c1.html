<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced English B2→C1 · 17-Day Intensive Course</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sb:#111827;--sb2:#1f2937;--bg:#f3f4f6;--card:#fff;--bdr:#e5e7eb;--t1:#111827;--t2:#6b7280;--t3:#9ca3af;
  --vocab:#7c3aed;--grammar:#1d4ed8;--reading:#0369a1;--writing:#b45309;--toefl:#b91c1c;--speaking:#047857;
  --c1:#d97706;--gbox:#f0fdf4;--gbox-b:#16a34a;--prompt:#eff6ff;--prompt-b:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden;background:var(--bg);color:var(--t1);font-size:15px}
body.dark{--bg:#0f172a;--card:#1e293b;--bdr:#334155;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--sb:#0a0f1a;--sb2:#1e293b;--gbox:#052e16;--prompt:#1e3a5f}
#sidebar{width:252px;min-width:252px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden;transition:width .22s,min-width .22s}
#sidebar.closed{width:0;min-width:0}
#sbh{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
#sbh h1{color:#f9fafb;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;line-height:1.4}
#sbh p{color:#4b5563;font-size:11px;margin-top:2px}
#daylist{overflow-y:auto;flex:1;padding:6px 0}
.di{display:flex;align-items:center;padding:9px 13px;cursor:pointer;border-left:3px solid transparent;gap:9px;transition:background .12s}
.di:hover{background:var(--sb2)}.di.active{background:var(--sb2);border-left-color:#818cf8}
.di.tday .dn{color:#f87171}.di.tday .dt{color:#fca5a5}.di.active .dn{color:#818cf8}
.dn{font-size:11px;font-weight:700;color:#4b5563;min-width:24px;font-variant-numeric:tabular-nums}
.dt{font-size:12px;color:#9ca3af;line-height:1.3}.di.active .dt{color:#f9fafb}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:0 18px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0}
.tbbtn{background:none;border:none;cursor:pointer;color:var(--t2);padding:5px;border-radius:5px;display:flex;align-items:center}
.tbbtn:hover{background:var(--bdr)}
#dlabel{font-size:13.5px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#navwrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.nb{background:none;border:1px solid var(--bdr);border-radius:5px;padding:4px 12px;cursor:pointer;font-size:12.5px;color:var(--t1)}
.nb:hover:not(:disabled){background:var(--bdr)}.nb:disabled{opacity:.3;cursor:default}
#dctr{font-size:11.5px;color:var(--t3);min-width:42px;text-align:center}
#content{flex:1;overflow-y:auto;padding:0}
.day-wrap{max-width:960px;margin:0 auto;padding:24px 24px 56px}
.day-hd{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--bdr)}
.day-hd h2{font-size:24px;font-weight:800;color:var(--t1)}
.day-hd .dnote{font-size:13px;color:var(--t3);font-style:italic;margin-top:5px}
.phase-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin:24px 0 10px;padding-left:2px}
.ds{background:var(--card);border:1px solid var(--bdr);border-radius:10px;margin-bottom:14px;overflow:hidden}
.sh{display:flex;align-items:center;gap:8px;padding:13px 16px 11px;border-top:3px solid;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.si{font-size:15px}
.ds.vocab .sh{border-top-color:var(--vocab);color:var(--vocab)}
.ds.grammar .sh{border-top-color:var(--grammar);color:var(--grammar)}
.ds.reading .sh{border-top-color:var(--reading);color:var(--reading)}
.ds.writing .sh{border-top-color:var(--writing);color:var(--writing)}
.ds.toefl .sh{border-top-color:var(--toefl);color:var(--toefl)}
.ds.speaking .sh{border-top-color:var(--speaking);color:var(--speaking)}
.sb{padding:16px 18px 18px}
.gbox{background:var(--gbox);border-left:3px solid var(--gbox-b);border-radius:0 6px 6px 0;padding:13px 15px;margin-bottom:16px}
.gbox-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gbox-b);margin-bottom:5px}
.gfocus{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:8px}
.gex p{font-size:13px;color:var(--t2);font-style:italic;line-height:1.65;padding:2px 0}
.exset{margin-bottom:20px}
.exset:last-child{margin-bottom:0}
.exlabel{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:5px}
.exinst{font-size:13.5px;color:var(--t2);margin-bottom:10px;line-height:1.55}
.wbank{background:var(--bg);border:1px dashed var(--bdr);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--t1);margin-bottom:10px;line-height:1.8}
.exlist{list-style:none;padding:0;counter-reset:item}
.exlist>li{counter-increment:item;padding:6px 0 6px 26px;position:relative;font-size:14px;color:var(--t1);line-height:1.55;border-bottom:1px solid var(--bg)}
.exlist>li:last-child{border-bottom:none}
.exlist>li::before{content:counter(item)".";position:absolute;left:0;color:var(--t3);font-size:12px;font-weight:600;top:8px}
.open-qs>li{padding-bottom:2px}
.lines{margin-top:6px}.lines div{height:24px;border-bottom:1px solid #e5e7eb;margin-bottom:4px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mwords,.mdefs{display:flex;flex-direction:column;gap:4px}
.mi{display:flex;align-items:center;gap:6px;font-size:13.5px;color:var(--t1);padding:3px 0}
.ab{display:inline-block;width:20px;height:20px;border:1.5px solid var(--bdr);border-radius:3px;flex-shrink:0}
.di2{font-size:13.5px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--bg)}
.di2:last-child{border-bottom:none}
.rtext{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:16px 18px;margin:10px 0 16px;font-size:14px;color:var(--t1);line-height:1.7}
.rtext p{margin-bottom:10px}.rtext p:last-child{margin-bottom:0}
.rtitle{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.short-r{font-size:13.5px}
.pre-q{background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:10px 13px;font-size:13px;color:#92400e;margin-bottom:12px}
.pbox{background:var(--prompt);border:1px solid var(--prompt-b);border-radius:8px;padding:13px 16px;margin:8px 0;font-size:14px;color:var(--t1);line-height:1.65}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 16px}
.plan-step{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px;display:flex;gap:10px}
.ps-num{width:26px;height:26px;background:var(--t3);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ps-body{flex:1;font-size:13px;color:var(--t2);line-height:1.5}.ps-body strong{color:var(--t1);display:block;margin-bottom:3px}
.langbox{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.lb-sec{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:11px 13px}
.lb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:7px}
.lb-sec span{display:block;font-size:13px;color:var(--t1);padding:2px 0 2px 12px;position:relative;line-height:1.45}
.lb-sec span::before{content:"–";position:absolute;left:0;color:var(--t3)}
.c1-sec .lb-lbl{color:var(--c1)}.c1-sec{border-color:#fde68a;background:#fefce8}
.c1box{background:#fefce8;border:1.5px solid #fde68a;border-radius:8px;padding:14px 16px;margin-top:16px}
.c1lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--c1);margin-bottom:7px}
.tbadge{display:inline-flex;align-items:center;background:#fef2f2;color:var(--toefl);border:1px solid #fecaca;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.chk{list-style:none;padding:0;margin:8px 0}
.chk li{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13.5px;color:var(--t2);border-bottom:1px solid var(--bg)}
.chk li:last-child{border-bottom:none}
.cb{display:inline-block;width:16px;height:16px;border:1.5px solid var(--bdr);border-radius:3px;flex-shrink:0;margin-top:1px}
.notes-box{border:1px solid var(--bdr);border-radius:7px;padding:10px;margin:8px 0}
.notes-box div{height:28px;border-bottom:1px solid var(--bdr);margin-bottom:4px}
.notes-box div:last-child{border-bottom:none}
.spq ol{margin-bottom:14px}
.game-box{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px 14px}
.game-name{font-size:13.5px;font-weight:700;color:var(--t1);margin-bottom:5px}
.game-desc{font-size:13px;color:var(--t2);line-height:1.55}
.akey{font-size:12px;color:var(--t3);background:var(--bg);border:1px solid var(--bdr);border-radius:5px;padding:6px 10px;margin-top:8px}
.akey .ak-lbl{font-weight:700;color:var(--t2);margin-right:4px}
.wc-note{font-size:12px;color:var(--t3);margin-top:10px;font-style:italic}
.tday-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.tday-banner .tblbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--toefl);margin-bottom:4px}
.tday-banner p{font-size:13.5px;color:var(--t2)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tphase{background:var(--card);border:1px solid var(--bdr);border-top:3px solid var(--toefl);border-radius:9px;padding:16px}
.tphase h3{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--toefl);margin-bottom:4px}
.tphase .tpdesc{font-size:12.5px;color:var(--t3);margin-bottom:9px}
.tphase ul{list-style:none;padding:0}
.tphase ul li{font-size:13px;color:var(--t2);padding:3px 0 3px 13px;position:relative;line-height:1.5}
.tphase ul li::before{content:"·";position:absolute;left:0;color:var(--toefl);font-weight:700}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:820px){.mgrid,.plan-grid,.langbox{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr}}


/* Click-to-reveal answers */
.arv{display:inline-block;cursor:pointer;user-select:none;vertical-align:middle}
.agap{display:inline-block;min-width:72px;border-bottom:2px solid #9ca3af;height:16px;vertical-align:bottom;margin:0 2px;transition:all .15s}
.aval{display:none;background:#fef3c7;color:#92400e;padding:1px 8px;border-radius:4px;font-weight:700;font-style:normal;border:1px solid #fde68a}
.arv.shown .agap{display:none}.arv.shown .aval{display:inline}
.arv::after{content:'▸';color:#d97706;font-size:9px;margin-left:2px;vertical-align:middle}
.arv.shown::after{display:none}
.ec-rv .agap{min-width:32px;font-size:11px;color:#d97706;font-weight:700;text-align:center;display:inline-flex;align-items:flex-end;justify-content:center;padding-bottom:1px}
/* Matching boxes */
.ab.mt-box{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:background .15s;user-select:none}
.ab.mt-box:hover{background:#eff6ff;border-color:#3b82f6}
.ab.mt-box.revealed{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.mt-hint{font-size:11px;color:#9ca3af;margin-top:4px;font-style:italic}
/* Screen-only key (for open Qs) */
.screen-key{font-size:12px;color:#9ca3af;margin-top:8px;cursor:pointer;user-select:none;display:block}
.screen-key .ak-lbl{color:#d97706;font-weight:700;margin-right:4px}
.screen-key .ak-body{display:none!important;margin-top:6px;color:#6b7280;line-height:1.6;padding:6px 10px;background:var(--bg);border-radius:5px;border:1px solid var(--bdr)}
.screen-key.open .ak-body{display:block!important}
.screen-key.open .ak-lbl::after{content:' ▾'}
.screen-key:not(.open) .ak-lbl::after{content:' ▸'}


@media print{
  /* ── Layout reset ───────────────────────────────────── */
  html,body{height:auto!important;overflow:visible!important;display:block!important;margin:0;padding:0}
  #sidebar,#topbar,#printbtn,.tbbtn,#navwrap,.screen-key,.mt-hint,.akey,
  .phase-lbl,.pre-q,.game-box,.spq,.tbadge,.wc-note{display:none!important}
  #main,#content{display:block!important;height:auto!important;overflow:visible!important;
    position:static!important;padding:0!important;margin:0!important}
  body{font-family:Georgia,'Times New Roman',serif;font-size:10pt;color:#000;background:#fff}
  .day-wrap{padding:8mm 10mm;max-width:100%}

  /* ── Page header (name/date) ────────────────────────── */
  .ph-hd{display:block!important;font-family:Arial,sans-serif;font-size:10pt;
    margin-bottom:6mm;padding-bottom:4mm;border-bottom:1.5px solid #000}
  .ph-hd strong{font-size:14pt;font-weight:700;display:block;margin-bottom:2mm}
  .day-hd{margin-bottom:4mm;padding-bottom:3mm;border-bottom:1px solid #ccc}
  .day-hd h2{font-size:14pt;font-weight:700;color:#000}
  .day-hd .dnote{display:none}

  /* ── Sections ───────────────────────────────────────── */
  .ds{border:1px solid #bbb;border-radius:0;margin-bottom:4mm;
    break-inside:avoid;page-break-inside:avoid;background:#fff!important}
  .sh{padding:3mm 4mm 2mm;font-size:8pt;letter-spacing:.06em;color:#333;border-top:2.5px solid #555}
  .ds.vocab .sh{border-top-color:#7c3aed}
  .ds.grammar .sh{border-top-color:#1d4ed8}
  .ds.reading .sh{border-top-color:#0369a1}
  .ds.writing .sh{border-top-color:#b45309}
  .ds.toefl .sh{border-top-color:#b91c1c}
  .ds.speaking .sh{border-top-color:#047857}
  .sb{padding:3mm 4mm 4mm}

  /* ── Exercise sets ──────────────────────────────────── */
  .exset{margin-bottom:3mm}
  .exset:last-child{margin-bottom:0}
  .exlabel{font-size:7.5pt;letter-spacing:.06em;color:#555;margin-bottom:1mm}
  .exinst{font-size:9pt;color:#222;margin-bottom:2mm;line-height:1.4}
  .exlist>li{font-size:9.5pt;padding:1mm 0 1mm 6mm;border-bottom:none;line-height:1.4}
  .exlist>li::before{font-size:8pt;top:2mm}

  /* ── Writing lines ──────────────────────────────────── */
  .lines{margin-top:1mm}
  .lines div{height:14px;border-bottom:1px solid #aaa;margin-bottom:2px}
  .open-qs .lines{margin-top:1mm}
  .notes-box{padding:2mm;margin:2mm 0}
  .notes-box div{height:14px;border-bottom:1px solid #aaa;margin-bottom:2px}

  /* ── Matching grid ──────────────────────────────────── */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:2mm;margin-bottom:2mm}
  .mi{font-size:9pt;padding:1mm 0}
  .ab{display:inline-block;width:14px;height:14px;border:1.5px solid #555;
    border-radius:2px;vertical-align:middle}
  .ab.mt-box{background:transparent!important;color:transparent!important}
  .di2{font-size:9pt;padding:1mm 0;border-bottom:none}

  /* ── Grammar box ────────────────────────────────────── */
  .gbox{background:#f8f8f8!important;border-left:3px solid #16a34a;
    padding:2mm 3mm;margin-bottom:3mm;border-radius:0}
  .gbox-lbl{font-size:7pt;margin-bottom:1mm}
  .gfocus{font-size:9pt;font-weight:600;margin-bottom:1mm}
  .gex p{font-size:8.5pt;line-height:1.4;padding:0.5mm 0}

  /* ── Word bank ──────────────────────────────────────── */
  .wbank{display:none}

  /* ── Prompt / planning ──────────────────────────────── */
  .pbox{background:#f0f6ff!important;border:1px solid #c7d9f0;
    padding:2mm 3mm;margin:2mm 0;font-size:9.5pt;line-height:1.4}
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:2mm;margin:2mm 0}
  .plan-step{background:#f8f8f8!important;border:1px solid #ddd;
    border-radius:0;padding:2mm;break-inside:avoid}
  .ps-num{width:18px;height:18px;font-size:8pt;flex-shrink:0}
  .ps-body{font-size:8.5pt;line-height:1.4}
  .ps-body strong{font-size:8.5pt;display:block;margin-bottom:0}
  .langbox{display:none}

  /* ── C1 challenge box ───────────────────────────────── */
  .c1box{background:#fffbeb!important;border:1.5px solid #f0c040;
    padding:2mm 3mm;margin-top:2mm;border-radius:0}
  .c1lbl{font-size:7pt;margin-bottom:1mm}
  .c1box .exinst{font-size:8.5pt}

  /* ── Reading text ───────────────────────────────────── */
  .rtext{background:#f8f8f8!important;border:1px solid #ccc;
    padding:3mm 4mm;margin:2mm 0}
  .rtitle{font-size:10pt;font-weight:700;margin-bottom:2mm;padding-bottom:1mm}
  .rtext p{font-size:9pt;line-height:1.5;margin-bottom:2mm}
  .rtext p:last-child{margin-bottom:0}
  .short-r .rtext,.short-r{font-size:9pt}

  /* ── Checklists ─────────────────────────────────────── */
  .chk{margin:2mm 0}
  .chk li{font-size:9pt;padding:1mm 0;border-bottom:none}
  .cb{width:12px;height:12px;border:1.5px solid #555;border-radius:2px}

  /* ── TOEFL notes box ────────────────────────────────── */
  .toefl .notes-box{min-height:18mm}

  /* ── Click-to-reveal: show gap lines, hide answers ─── */
  .arv .agap{display:inline-block!important;min-width:64px;
    border-bottom:1.5px solid #555;height:14px;vertical-align:bottom}
  .arv .aval{display:none!important}
  .arv::after,.arv.shown::after{display:none!important}
  .ec-rv .agap{display:inline-block!important;font-size:9pt}
  .ec-rv .aval{display:none!important}

  /* ── Page breaks ────────────────────────────────────── */
  .ds.vocab{break-before:auto}
  h2,h3{break-after:avoid}
}
.ph-hd{display:none;font-size:11pt;margin-bottom:14px;border-bottom:1px solid #ccc;padding-bottom:8px}
.ph-hd strong{font-size:15pt;display:block;margin-bottom:3px}
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sbh">
    <h1>Advanced English B2→C1</h1>
    <p>17-Day Intensive Course</p>
  </div>
  <div id="daylist"></div>
</aside>
<div id="main">

<div id="topbar">
  <button class="tbbtn" onclick="toggleSB()" title="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <span id="dlabel">Day 1 — Identity &amp; First Impressions</span>
  <div id="navwrap">
    <button class="nb" id="prevbtn" onclick="nav(-1)" disabled>&#8592; Prev</button>
    <span id="dctr">1 / 17</span>
    <button class="nb" id="nextbtn" onclick="nav(1)">Next &#8594;</button>
    <button class="nb" id="printbtn" onclick="printDay()" style="margin-left:8px">&#128438; Print</button>
    <button class="tbbtn" onclick="toggleDark()" style="margin-left:4px" title="Toggle dark mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</div>
<div id="content"></div>
</div>
<script>
const DAYS_HTML = [
`<div class="ph-hd"><strong>Day 1 — Identity & First Impressions</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 1 — Identity & First Impressions</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Identity</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter for each word.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>curious</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>outgoing</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>laid-back</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>competitive</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>driven</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>introvert</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>open-minded</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>self-aware</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;eager to learn or know more about something</div><div class="di2"><b>b.</b>&ensp;confident and friendly; enjoys meeting new people</div><div class="di2"><b>c.</b>&ensp;relaxed and not easily stressed</div><div class="di2"><b>d.</b>&ensp;strongly motivated to win or be better than others</div><div class="di2"><b>e.</b>&ensp;highly motivated and determined to succeed</div><div class="di2"><b>f.</b>&ensp;gains energy from time alone; prefers calm environments</div><div class="di2"><b>g.</b>&ensp;willing to consider new ideas, even if different from your own</div><div class="di2"><b>h.</b>&ensp;having a clear understanding of your own emotions and personality</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal the answer.</p><div class="wbank"><em>curious</em>&ensp;·&ensp;<em>outgoing</em>&ensp;·&ensp;<em>driven</em>&ensp;·&ensp;<em>self-aware</em>&ensp;·&ensp;<em>competitive</em>&ensp;·&ensp;<em>laid-back</em>&ensp;·&ensp;<em>passionate about</em>&ensp;·&ensp;<em>open-minded</em></div><ol class="exlist"><li>She's incredibly <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">curious</span></span> — she always asks follow-up questions about everything.<div class="lines"><div></div></div></li><li>He becomes very <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">competitive</span></span> during board games — he absolutely hates losing.<div class="lines"><div></div></div></li><li>Despite failing twice, she remained <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">driven</span></span> and kept pushing toward her goal.<div class="lines"><div></div></div></li><li>Being <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">self-aware</span></span> helps you recognise e present form. Click the blank to reveal.</p><ol class="exlist"><li>I <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">believe</span></span> (believe) personality can change significantly over time.<div class="lines"><div></div></div></li><li>What <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">do</span></span> you <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">think</span></span> (think) about online learning?<div class="lines"><div></div></div></li><li>She <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">doesn't like</span></span> (not/like) being the centre of attention at events.<div class="lines"><div></div></div></li><li>He <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">considers</span></span> (consider) himself more of an introvert than an extrovert.<div class="lines"><div></div></div></li><li><span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Do</span></span> they <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">understand</span></span> (understand) how much self-awareness affects communication?<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Each sentence has ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>She is believing that experience shapes character more than genetics.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ believes</span></span><div class="lines"><div></div></div></li><li>What do you meaning when you say someone is 'driven'?<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ mean</span></span><div class="lines"><div></div></div></li><li>He don't usually speak first in group discussions.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ doesn't</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write 3 sentences about your own personality. Use a different opener each time: <em>I tend to… / I consider myself… / What I find challenging is…</em></p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · Who Are You Online?</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> In one sentence, how do you present yourself differently online vs. in person?</div><div class="rtext"><div class="rtitle">Who Are You Online?</div><p>Social media has fundamentally changed how young people construct and present their identities. Before platforms like Instagram and TikTok, identity development was a largely private process — a slow, uncertain exploration of values and interests. Today, it is increasingly public, quantified and performance-based.</p><p>Researchers have found that teenagers who actively curate their profiles spend more time thinking about how others perceive them than about who they actually are. This shift from inner reflection to external presentation deepens self-consciousness rather than genuine self-awareness.</p><p>However, not all digital identity work is harmful. For young people who feel misunderstood in their immediate environment — those exploring their cultural heritage or unconventional interests — online communities can provide genuine belonging. The key distinction lies in motivation. Teenagers who use social media primarily to connect tend to develop stronger self-awareness. Those who use it mainly to manage impressions often feel disconnected from their actual values.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>How has social media changed identity development, according to the text?<div class="lines"><div></div><div></div><div></div></div></li><li>Why can social media sometimes have a positive effect on identity?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author identify as the key variable?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Made it public and performance-based 2-Provides belonging for those who feel misunderstood 3-Motivation: connecting vs managing impressions</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>carefully selected and organised (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">curated</span></span><div class="lines"><div></div></div></li><li>seeming real, not artificial (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">genuine / authentic</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The author argues motivation determines whether social media helps or harms. Do you agree? Write 3–4 sentences using evidence from the text and your own experience.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Opinion Essay (Diagnostic)</div><div class="sb"><div class="pbox">People are shaped more by their experiences than by their personality. Do you agree or disagree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Introduction</strong>State your position clearly. Avoid starting with 'In my opinion…'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Body</strong>Two reasons, or one reason + one counterargument you address<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Conclusion</strong>Restate your position in different words<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Although…, I believe…</span><span>One key reason is that…</span><span>On the other hand,…</span><span>This suggests that…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>A more nuanced view would be…</span><span>Evidence suggests that…, rather than…</span><span>It could be argued that…; however,…</span></div></div><p class="wc-note">Target: 220–280 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Independent Speaking Task 1</div><div class="sb"><span class="tbadge">Independent Speaking</span><p class="exinst">Prepare <strong>15 seconds</strong>. Speak <strong>45 seconds</strong>. Use PREP: Point → Reason → Example → Restate.</p><div class="pbox">Describe a person who has influenced the way you think. Explain why this person has had such an impact on you.</div><p class="exlabel">Notes (keywords only)</p><div class="notes-box"><div></div><div></div><div></div></div><ul class="chk"><li><span class="cb"></span>I stated my main point in the first sentence.</li><li><span class="cb"></span>I gave a clear reason with a specific example.</li><li><span class="cb"></span>I avoided long pauses and filler words (um, like, so…).</li><li><span class="cb"></span>I finished within the time limit.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Discussion</div><div class="sb"><div class="spq"><ol class="exlist"><li>Describe your personality in three words. Would your friends agree?</li><li>Are you more of an introvert or extrovert? Has this changed as you've grown up?</li><li>Is it possible to truly know yourself, or is self-knowledge always incomplete?</li></ol></div><div class="game-box"><p class="game-name">Two Truths and a Lie</p><p class="game-desc">Write three statements — two true, one false. All must be believable. Group has 1 minute to question you before voting on the lie. Aim to fool as many people as possible.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 2 — Movies & Storytelling</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 2 — Movies & Storytelling</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Movies & Storytelling</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>genre</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>plot twist</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>cast</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>suspense</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>cliffhanger</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>soundtrack</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>blockbuster</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>critically acclaimed</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a category of film: thriller, comedy, sci-fi, etc.</div><div class="di2"><b>b.</b>&ensp;a surprising change in the direction of a story</div><div class="di2"><b>c.</b>&ensp;all the actors who perform in a film</div><div class="di2"><b>d.</b>&ensp;tension and uncertainty about what will happen next</div><div class="di2"><b>e.</b>&ensp;an ending that leaves the audience in uncertainty</div><div class="di2"><b>f.</b>&ensp;the music used in a film</div><div class="di2"><b>g.</b>&ensp;a very commercially successful film</div><div class="di2"><b>h.</b>&ensp;highly praised by professional film critics</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>cliffhanger</em>&ensp;·&ensp;<em>plot twist</em>&ensp;·&ensp;<em>soundtrack</em>&ensp;·&ensp;<em>genre</em>&ensp;·&ensp;<em>cast</em>&ensp;·&ensp;<em>blockbuster</em></div><ol class="exlist"><li>The film ended on a <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">cliffhanger</span></span> — we had no idea whether the main character survived.<div class="lines"><div></div></div></li><li>Nobody expected the <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">plot twist</span></span> in the final scene; it changed everything we understood.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">soundtrack</span></span> was so powerful that I recognised the film from the first few notes.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">cast</span></span> included several award-winning actors at the height of their careers.<div class="lines"><div></div></div></li><li>Despite its enormous budget, the <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">blockbuster</span></span> failed to impress either critics or audiences.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Replace each underlined phrase with a precise film vocabulary term. Click to reveal.</p><ol class="exlist"><li>The film <u>did extremely well commercially</u>. → It was a <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">box office</span></span> success.<div class="lines"><div></div></div></li><li>Critics <u>spoke very highly</u> of the performance. → The performance was <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">critically acclaimed</span></span> .<div class="lines"><div></div></div></li></ol></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Narrative Tenses</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Three past tenses work together in storytelling.</p><div class="gex"><p><strong>Past Simple</strong> – main events: She <em>noticed</em> a light in the window.</p><p><strong>Past Continuous</strong> – interrupted background: She <em>was watching</em> the film when her phone <em>rang</em>.</p><p><strong>Past Perfect</strong> – earlier action: By the time police <em>arrived</em>, the suspect <em>had already left</em>.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete with the correct tense. Click the blank to reveal.</p><ol class="exlist"><li>The audience <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">gasped</span></span> (gasp) when the killer's identity was revealed.<div class="lines"><div></div></div></li><li>I <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hadn't seen</span></span> (not/see) the trailer, so the plot twist completely surprised me.<div class="lines"><div></div></div></li><li>While the protagonist <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">was running</span></span> (run) through the crowd, his phone <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">rang</span></span> (ring).<div class="lines"><div></div></div></li><li>The director <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had already filmed</span></span> (already/film) three scenes before the lead actor arrived.<div class="lines"><div></div></div></li><li>By the time the credits rolled, most people <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">were crying</span></span> (cry).<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE tense error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>When the credits appeared, I realised I was seeing this film before.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ had seen</span></span><div class="lines"><div></div></div></li><li>The main character ran through the street when he dropped his phone.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ was running (past cont. for background action)</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write 5–7 sentences retelling a scene from a film. Use all three narrative tenses at least once. Underline each verb and label it PS / PC / PP.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · Cinema and the Stories We Tell Ourselves</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Name one film that changed the way you see something. What made it powerful?</div><div class="rtext"><div class="rtitle">Cinema and the Stories We Tell Ourselves</div><p>No other medium combines image, sound, narrative and performance so seamlessly, creating an experience that can move audiences to tears within minutes. What makes film storytelling so effective is its ability to manipulate time. Unlike novels, which depend on the reader's imagination, films impose a specific rhythm on their audience. A well-placed edit, a shift in music, or a sudden close-up can change the emotional temperature of a scene instantly. Alfred Hitchcock famously argued that the length of a shot, not just its content, determines how an audience feels.</p><p>The plot twist is perhaps film's most powerful device. When used well, it forces the audience to reinterpret everything they have already watched. Films celebrated for their twists are not simply unpredictable — their revelations were carefully prepared in advance, every detail pointing toward the ending.</p><p>Film critics often argue that the best stories are not about what happens, but about why it matters. A film about a heist is really about loyalty. A war film is really about conviction. The surface narrative is the vehicle; the deeper meaning is what stays with audiences long after the credits roll.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What advantage does film have over novels as a storytelling medium?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author say makes a plot twist genuinely successful?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author mean by 'the surface narrative is the vehicle'?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Film imposes rhythm/emotion through editing, sound, visuals 2-Must be carefully prepared/earned, not just surprising 3-The plot is a way to explore deeper themes; what stays is the meaning</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>smoothly, without obvious joins (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">seamlessly</span></span><div class="lines"><div></div></div></li><li>no longer relevant or in use (implied at end): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">obsolete</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The author says "the best stories are not about what happens, but about why it matters." Choose a film and explain what it is REALLY about beneath its surface. Write 3–4 sentences.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Film Review Paragraph</div><div class="sb"><div class="pbox">Write a review paragraph for a film you have seen. Your reader has not seen it.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Hook + context</strong>Strong opening sentence. Include title, director, genre. NOT: 'This film is about…'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Brief plot summary</strong>2–3 sentences. Enough to interest — no spoilers.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Evaluation + Recommendation</strong>What worked? What didn't? Who would enjoy this film?<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Set in …, the film follows …</span><span>The standout performance comes from …</span><span>Fans of … will not be disappointed.</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>What sets this film apart is …</span><span>Beneath its surface, the film grapples with …</span><span>It rewards patient viewers with …</span></div></div><p class="wc-note">Target: 150–200 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Reading Comprehension Question Types</div><div class="sb"><span class="tbadge">Reading Comprehension</span><p class="exinst">Before answering, identify the type: <strong>Factual</strong> / <strong>Vocabulary</strong> / <strong>Inference</strong> / <strong>Purpose</strong>.</p><div class="rtext short-r"><p>Streaming platforms have transformed film consumption. By releasing entire series simultaneously, they have fundamentally altered viewing habits. Rather than waiting weekly, audiences now consume complete narratives in days. Some researchers argue this reduces collective cultural experience — the shared speculation about what happens next. Others counter that accessibility has expanded storytelling's reach to previously excluded audiences.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Identify the type and answer. Click to reveal answers.</p><ol class="exlist"><li>What specific change to viewing habits does the passage describe? <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Factual</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Consuming complete series rather than waiting weekly</span></span><div class="lines"><div></div></div></li><li>The word 'simultaneously' most nearly means: a) one at a time b) quickly c) at the same time d) in sequence <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Vocabulary</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">c</span></span><div class="lines"><div></div></div></li><li>What can be inferred about the author's overall view? a) Supports streaming b) Opposes it c) Presents both sides d) Believes accessibility matters most <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Inference</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">c</span></span><div class="lines"><div></div></div></li></ol></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Movies & Storytelling</div><div class="sb"><div class="spq"><ol class="exlist"><li>What is your favourite film genre? What does your taste reveal about your personality?</li><li>Describe a scene that genuinely surprised or moved you. What made it so effective?</li><li>Can a film genuinely change the way people think about a serious issue? Give an example.</li></ol></div><div class="game-box"><p class="game-name">Guess That Film</p><p class="game-desc">Describe a film using only emotions, adjectives and what happens to the character — no title, actor or character names. Partner has 45 seconds to guess. Switch roles. Fastest guesser after 3 rounds wins.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 3 — Sports & Competition</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 3 — Sports & Competition</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Sports & Competition</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>championship</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>underdog</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>tactics</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>stamina</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>comeback</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>training regime</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>referee</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>perform under pressure</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a competition to find the best team or player in a sport</div><div class="di2"><b>b.</b>&ensp;a competitor expected to lose who performs surprisingly well</div><div class="di2"><b>c.</b>&ensp;a plan or strategy used to gain advantage in competition</div><div class="di2"><b>d.</b>&ensp;physical and mental strength to keep going for a long time</div><div class="di2"><b>e.</b>&ensp;a return to success after a period of failure or absence</div><div class="di2"><b>f.</b>&ensp;a structured, regular programme of exercise and practice</div><div class="di2"><b>g.</b>&ensp;an official who enforces the rules during a match</div><div class="di2"><b>h.</b>&ensp;to execute skills effectively in high-stakes situations</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>stamina</em>&ensp;·&ensp;<em>underdog</em>&ensp;·&ensp;<em>comeback</em>&ensp;·&ensp;<em>tactics</em>&ensp;·&ensp;<em>championship</em>&ensp;·&ensp;<em>referee</em></div><ol class="exlist"><li>Nobody expected the <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">underdog</span></span> to win, but they outplayed the favourites all game.<div class="lines"><div></div></div></li><li>The coach spent half-time discussing <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">tactics</span></span> for the second half.<div class="lines"><div></div></div></li><li>You need incredible <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">stamina</span></span> to compete in a triathlon — it's not just about speed.<div class="lines"><div></div></div></li><li>After two years out with injury, her <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">comeback</span></span> was one of sport's most emotional moments.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">referee</span></span> made a controversial decision in the final minute that changed the result.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Rewrite each informal sentence with greater precision. Click to reveal.</p><ol class="exlist"><li>'They play well even when things are very stressful.' → They <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">perform under pressure</span></span> effectively.<div class="lines"><div></div></div></li><li>'He does the same hard exercises every day.' → He follows a rigorous <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">training regime</span></span> .<div class="lines"><div></div></div></li></ol></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Comparatives, Superlatives & Degree Adverbs</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Add degree adverbs to make comparisons more precise.</p><div class="gex"><p><strong>considerably / significantly</strong>: She is <em>considerably faster</em> than her rival.</p><p><strong>by far</strong>: This was <em>by far the most impressive</em> comeback this decade.</p><p><strong>nowhere near as … as</strong>: He is <em>nowhere near as consistent as</em> the champion.</p><p><strong>just as … as</strong>: Mental strength is <em>just as important as</em> physical fitness.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Rewrite using the degree adverb in brackets. Click the blank to reveal.</p><ol class="exlist"><li>Football is more popular than rugby. (considerably) → Football is <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">considerably more popular</span></span> than rugby.<div class="lines"><div></div></div></li><li>She is good, but not as good as the world champion. (nowhere near) → She is <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">nowhere near as good as</span></span> the world champion.<div class="lines"><div></div></div></li><li>This is the most memorable result in the club's history. (by far) → This is <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">by far the most memorable</span></span> result in the club's history.<div class="lines"><div></div></div></li><li>Mental resilience and physical fitness matter equally. (just as…as) → Mental resilience is <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">just as important as</span></span> physical fitness.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>She runs more faster than anyone else on the team.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ faster (remove 'more')</span></span><div class="lines"><div></div></div></li><li>He is nowhere near consistent as his biggest rival.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ nowhere near as consistent as</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Compare two sports OR two athletes in 4–5 sentences. Use at least THREE different degree adverbs and one structure with <em>whereas</em> or <em>while</em>.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Mind of a Champion</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Think of a time you performed well under pressure. What helped you?</div><div class="rtext"><div class="rtitle">The Mind of a Champion</div><p>Sports psychologists increasingly argue that physical ability alone is rarely sufficient to explain performance at the elite level. What separates good athletes from great ones is largely mental.</p><p>One of the most researched concepts is <em>flow</em> — a state of complete absorption where time seems to slow and performance feels effortless. Research by Mihaly Csikszentmihalyi found that flow occurs most reliably when the challenge of a task closely matches the performer's skill level: neither too easy to be boring nor too difficult to be overwhelming.</p><p>Mental resilience also plays a crucial role. Resilient athletes do not experience fewer setbacks than their competitors — they respond to them differently. Rather than interpreting failure as evidence of permanent inability, they treat it as information. A missed penalty becomes a data point for improvement, not a source of shame.</p><p>Elite performers consistently demonstrate what psychologists call <em>process focus</em>: concentrating entirely on the present action rather than the outcome. A tennis player thinking about winning the match during the point is far less effective than one thinking only about the next shot.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>Explain 'flow' in your own words and describe when it is most likely to occur.<div class="lines"><div></div><div></div><div></div></div></li><li>How do mentally resilient athletes respond to setbacks differently?<div class="lines"><div></div><div></div><div></div></div></li><li>What is 'process focus' and why does it improve performance?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-State of complete absorption; occurs when challenge matches skill 2-Treat failure as data/information not permanent inability 3-Focusing on present action not outcome; prevents distraction</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>enough (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">sufficient</span></span><div class="lines"><div></div></div></li><li>the ability to recover from difficulty (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">resilience</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The text says resilient athletes treat failure as "data points for improvement." How might this apply outside sport — in studying or creative work? Write 3–4 sentences with a specific example.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Comparison Paragraph</div><div class="sb"><div class="pbox">Compare two athletes OR two sports. Use specific examples to argue which is more impressive.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Opening statement</strong>Introduce both subjects and your overall argument.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Comparisons</strong>Use degree adverbs: considerably / significantly / nowhere near / just as…as<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Conclusion</strong>Restate your judgement with a hedged claim: tends to / appears to<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>X is considerably more…than Y.</span><span>Whereas X focuses on…, Y requires…</span><span>In terms of…, both are comparable.</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>X surpasses Y in…, particularly when…</span><span>The distinction lies not in… but in…</span></div></div><p class="wc-note">Target: 180–220 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><p class="exinst">Read in <strong>90 seconds</strong>. Teacher reads a lecture. Take notes. Speak <strong>60 seconds</strong>.</p><div class="rtext short-r"><p>Team sports provide significant physical and psychological health benefits. Regular participation improves cardiovascular fitness and builds coordination. Studies show that young people who play team sports are less likely to develop obesity and related conditions. The structured nature of team training also builds discipline and time management skills.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">Explain how the lecture adds to or supports the reading. Use information from both sources.</div><ul class="chk"><li><span class="cb"></span>I mentioned both the reading and the lecture.</li><li><span class="cb"></span>I used at least two reporting verbs (argues, suggests, explains).</li><li><span class="cb"></span>I did NOT express my own personal opinion.</li><li><span class="cb"></span>I connected the ideas rather than simply describing each source.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Sports & Competition</div><div class="sb"><div class="spq"><ol class="exlist"><li>Is sport too competitive today, especially for young people? Where should the line be?</li><li>Think of a famous underdog story. What made it so compelling?</li><li>Is mental strength more important than physical ability at the elite level?</li></ol></div><div class="game-box"><p class="game-name">Would You Rather — Sports Edition</p><p class="game-desc">Each student defends their answer for 20 seconds. Challenge with one follow-up question. 1) Olympic gold in a minor sport, or second place in the World Cup? 2) Best in the world at a sport nobody watches, or average at the most popular? 3) Marathon stamina or 100m explosive speed?</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 4 — Food & Culture</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 4 — Food & Culture</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Food & Culture</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>cuisine</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>texture</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>craving</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>bland</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>appetizing</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>street food</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>acquired taste</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>comfort food</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a style of cooking associated with a country or region</div><div class="di2"><b>b.</b>&ensp;how a food feels in the mouth: crunchy, creamy, smooth, etc.</div><div class="di2"><b>c.</b>&ensp;an intense, specific desire for a particular food</div><div class="di2"><b>d.</b>&ensp;lacking strong taste or flavour; uninteresting</div><div class="di2"><b>e.</b>&ensp;looking or smelling attractive and making you want to eat</div><div class="di2"><b>f.</b>&ensp;food prepared and sold by vendors in public outdoor spaces</div><div class="di2"><b>g.</b>&ensp;something enjoyed only after trying it several times</div><div class="di2"><b>h.</b>&ensp;food that provides emotional wellbeing, often connected to childhood</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>cuisine</em>&ensp;·&ensp;<em>texture</em>&ensp;·&ensp;<em>craving</em>&ensp;·&ensp;<em>bland</em>&ensp;·&ensp;<em>appetizing</em>&ensp;·&ensp;<em>street food</em>&ensp;·&ensp;<em>acquired taste</em>&ensp;·&ensp;<em>comfort food</em></div><ol class="exlist"><li>The soup smelled incredible — it was immediately <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">appetizing</span></span>.<div class="lines"><div></div></div></li><li>I had a strong <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">craving</span></span> for something spicy, so I ordered the hottest dish on the menu.<div class="lines"><div></div></div></li><li>The chicken had no seasoning — it was completely <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">bland</span></span> and disappointing.<div class="lines"><div></div></div></li><li>When she's unwell, her grandmother's rice soup is the ultimate <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">comfort food</span></span>.<div class="lines"><div></div></div></li><li>Japanese <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">cuisine</span></span> is celebrated worldwide for its precise balance of flavour and presentation.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose THREE words from today's list. For each, write one sentence that creates a clear sensory image — not just a definition.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Modal Verbs for Advice & Recommendation</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Different modals signal different strengths of advice.</p><div class="gex"><p><strong>should / ought to</strong> – general advice: You <em>should try</em> the local market.</p><p><strong>must / have to</strong> – strong recommendation: You <em>must visit</em> the night market.</p><p><strong>might want to / could</strong> – gentle suggestion: You <em>might want to avoid</em> tourist restaurants.</p><p><strong>had better</strong> – urgent warning: You <em>had better book</em> in advance.</p><p><strong>I'd recommend + -ing</strong>: <em>I'd recommend trying</em> it with lime.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete with the most appropriate modal. Click to reveal.</p><ol class="exlist"><li>You <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">should/must</span></span> try the traditional rice dish — it's the regional speciality. (general advice)<div class="lines"><div></div></div></li><li>You <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had better/must</span></span> arrive early. The market closes at noon and everything will be gone. (urgent)<div class="lines"><div></div></div></li><li>If you dislike spicy food, you <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">might want to/could</span></span> avoid the red curry. (gentle suggestion)<div class="lines"><div></div></div></li><li>You <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">I'd recommend</span></span> eating in small local restaurants away from the main square. (personal suggestion)<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Rewrite using the modal in brackets. Click to reveal.</p><ol class="exlist"><li>'It's a good idea to try the local bread.' (should) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">You should try the local bread.</span></span><div class="lines"><div></div></div></li><li>'Don't eat from the cart near the bus station.' (had better not) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">You had better not eat from the cart near the bus station.</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write a short food guide paragraph (5–6 sentences) for a visitor to your city. Use at least FOUR different modal structures. Make it sound genuine, not like a tourist website.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · What Street Food Tells Us About a Culture</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Name one dish you strongly associate with your culture or family. Why is it meaningful?</div><div class="rtext"><div class="rtitle">What Street Food Tells Us About a Culture</div><p>Walk through the streets of Mexico City, Bangkok or Naples and you notice something remarkable: the most authentic food is rarely found in restaurants. It is sold from carts and folding tables, prepared by vendors who learned their recipes not from culinary schools but from grandparents and neighbours. Street food, arguably more than any other form of cuisine, tells us who a culture is.</p><p>Dishes rarely emerge in isolation — they reflect geography, history and necessity. The prevalence of corn in Mexican street food reflects centuries of indigenous agricultural tradition. The spices in South Asian snacks carry the history of trade with Africa and the Middle East. To eat a culture's street food is, in a small way, to eat its history.</p><p>Globalisation has made the picture more complex. A dish considered authentically local may contain ingredients that arrived from the other side of the world centuries ago. The tomato is central to Italian cuisine, yet it arrived from South America in the 16th century. Identity, it turns out, is as dynamic in the kitchen as it is everywhere else.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What does the author mean when they say street food 'tells us who a culture is'?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author suggest is lost when street vendors are displaced by gentrification?<div class="lines"><div></div><div></div><div></div></div></li><li>Why does the author use the tomato as an example in the final paragraph?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-It reflects a culture's history, geography, values 2-A tradition and identity, not just a cooking style 3-To show 'authentic' identity is always influenced by others — it is dynamic, not fixed</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words in the text that match these meanings. Click to reveal.</p><ol class="exlist"><li>the widespread presence of something (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">prevalence</span></span><div class="lines"><div></div></div></li><li>changing and evolving over time (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">dynamic</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">The author argues "identity is as dynamic in the kitchen as it is everywhere else." What does this imply about "authentic" food culture? Is authenticity in food important or overrated? Write 4–5 sentences with a clear argument.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Recommendation Paragraph</div><div class="sb"><div class="pbox">Describe the best food experience you have ever had — or one you would love to have. Persuade your reader to seek out the same experience.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Opening hook</strong>Begin with a sensory detail. NOT: 'I want to tell you about…'<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Setting & description</strong>Where, when? Use at least two vocabulary words from today.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Why it matters</strong>What did this food make you feel? What did it connect you to?<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>The smell hit me before I even saw it.</span><span>The texture was unlike anything I had expected.</span><span>I'd strongly recommend trying …</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>What struck me most was not the flavour itself, but …</span><span>More than just food, it was a connection to …</span></div></div><p class="wc-note">Target: 150–180 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><p class="exinst">Read in 90 seconds. Teacher reads a lecture. Take notes. Speak 60 seconds.</p><div class="rtext short-r"><p>Food traditions are central to cultural identity. In many communities, recipes are passed down through generations as living heritage. Preparing a traditional dish connects individuals to their family history, geographical roots, and a shared sense of belonging. Anthropologists argue that adopting globalised fast food can gradually weaken cultural identity over time.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">The lecture presents a perspective that challenges or extends the reading. Explain the connection between both sources.</div><ul class="chk"><li><span class="cb"></span>I referenced a specific point from the reading.</li><li><span class="cb"></span>I referenced a specific point from the lecture.</li><li><span class="cb"></span>I explained the relationship (agreement / challenge / extension).</li><li><span class="cb"></span>I used reporting verbs: argues, suggests, points out, challenges.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Food & Culture</div><div class="sb"><div class="spq"><ol class="exlist"><li>Is food an important part of your cultural identity? What dish would best represent your culture?</li><li>Have you ever eaten something that was an 'acquired taste'? How did your opinion change?</li><li>Has globalisation made food culture richer or poorer? Give specific examples.</li></ol></div><div class="game-box"><p class="game-name">Describe It Without Saying It</p><p class="game-desc">Describe a dish using only texture, colour, temperature and feeling — no ingredient names. Partner has 45 seconds to guess. Switch roles after each correct answer.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 5 — Technology & Social Media</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 5 — Technology & Social Media</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Technology & Social Media</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>algorithm</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>viral</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>influencer</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>scroll</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>screen time</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>digital detox</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>curate</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>built-in habit loop</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a set of rules a computer fo
