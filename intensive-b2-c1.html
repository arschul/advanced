 natural phenomenon, supported by evidence</div><div class="di2"><b>b.</b>&ensp;a proposed explanation that has not yet been tested</div><div class="di2"><b>c.</b>&ensp;a scientific test carried out under controlled conditions</div><div class="di2"><b>d.</b>&ensp;facts or observations that support or challenge a claim</div><div class="di2"><b>e.</b>&ensp;a significant and sudden scientific advance or discovery</div><div class="di2"><b>f.</b>&ensp;the act of carefully watching something to gather information</div><div class="di2"><b>g.</b>&ensp;to make something clearer or easier to understand</div><div class="di2"><b>h.</b>&ensp;to make it easier for something important to happen in the future</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>theory</em>&ensp;·&ensp;<em>hypothesis</em>&ensp;·&ensp;<em>experiment</em>&ensp;·&ensp;<em>evidence</em>&ensp;·&ensp;<em>breakthrough</em>&ensp;·&ensp;<em>observation</em>&ensp;·&ensp;<em>shed light on</em>&ensp;·&ensp;<em>pave the way for</em></div><ol class="exlist"><li>The discovery of penicillin was a major <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">breakthrough</span></span> that transformed how we treat infections.<div class="lines"><div></div></div></li><li>Before running the <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">experiment</span></span>, scientists needed a clear <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hypothesis</span></span> about what they expected to find.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">theory</span></span> of evolution is one of the most thoroughly supported ideas in all of science.<div class="lines"><div></div></div></li><li>This new research may <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">shed light on</span></span> the causes of a condition that has puzzled doctors for decades.<div class="lines"><div></div></div></li><li>A careful <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">observation</span></span> — noticing that mould killed bacteria nearby — led Fleming to discover antibiotics.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Many people confuse <em>hypothesis</em> and <em>theory</em> in everyday speech. Explain the precise scientific difference in 2–3 sentences. Why does the confusion matter?</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Third Conditional</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Third Conditional</p><div class="gex"><p>Structure: <strong>If + had + past participle, would have + past participle</strong></p><p>If scientists <em>hadn't discovered</em> penicillin, millions <em>would have died</em> from infections.</p><p>Error: ✗ <em>If they would have discovered…</em> ✓ <em>If they had discovered…</em></p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>If Newton <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hadn't observed</span></span> (not/observe) the apple falling, he might <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">have taken</span></span> (take) longer to develop his theory.<div class="lines"><div></div></div></li><li>If Marie Curie <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hadn't pursued</span></span> (not/pursue) her research, the discovery of radioactivity <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would have been delayed</span></span> (delay) by years.<div class="lines"><div></div></div></li><li>If researchers <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had shared</span></span> (share) data earlier, the vaccine <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would have been developed</span></span> (develop) months sooner.<div class="lines"><div></div></div></li><li>If the printing press <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hadn't been invented</span></span> (not/be invented), scientific knowledge <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would have spread</span></span> (spread) much more slowly.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>If they would have discovered the cure sooner, many lives could have been saved.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ If they had discovered…</span></span><div class="lines"><div></div></div></li><li>If the experiment had fail, we would lost months of critical research.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ had failed / would have lost</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose ONE real scientific discovery. Write a short paragraph (4–5 sentences) using the third conditional. What would NOT exist today if this discovery had never been made?</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · Happy Accidents: Science's Greatest Mistakes</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Can you name any invention or discovery made by accident? What do you know about it?</div><div class="rtext"><div class="rtitle">Happy Accidents: Science's Greatest Mistakes</div><p>The history of science is frequently presented as a story of deliberate progress. This narrative omits something important: a surprising number of significant discoveries were made entirely by accident.</p><p>In 1928, Alexander Fleming returned from holiday to find one of his bacterial cultures contaminated by blue-green mould. A less careful scientist might have discarded the sample. Fleming noticed something extraordinary: the bacteria around the mould were dead. He named the substance penicillin. The antibiotic revolution began with a spoiled experiment.</p><p>Spencer Silver, an engineer at 3M, invented the adhesive for Post-it Notes while trying to develop a super-strong glue — and created something apparently useless: a weak, repositionable adhesive. It took another engineer, Art Fry, to recognise its potential years later.</p><p>What these stories share is not simply luck, but what Louis Pasteur identified in 1854: 'Chance favours the prepared mind.' Each discoverer had the knowledge and attentiveness to recognise something significant in what appeared to be a failure. The accident provided the data; the scientific mind provided the interpretation.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What conventional view of scientific progress does the author challenge?<div class="lines"><div></div><div></div><div></div></div></li><li>Why does the author describe Fleming as a 'careful' scientist?<div class="lines"><div></div><div></div><div></div></div></li><li>What does Pasteur's quote mean in the context of this text?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-That science is always deliberate and systematic 2-He noticed something important in a ruined experiment instead of throwing it away 3-Luck only benefits those with the knowledge to recognise its significance</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>made impure by contact with something unwanted (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">contaminated</span></span><div class="lines"><div></div></div></li><li>across different fields of study (§3): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">across disciplines</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text. Use evidence from the text and your own experience.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Choose one scientific discovery. Write a…</div><div class="sb"><div class="pbox">Choose one scientific discovery. Write about what led to it and how it changed the world.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Context</strong>What problem existed before? What was the state of knowledge?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>The discovery</strong>What happened? How was it made? Be concise.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Effect + Third Conditional</strong>A major consequence OR: what wouldn't exist without it?<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Before this discovery,…</span><span>The breakthrough came when…</span><span>As a direct result,…</span><span>Without this discovery,…would never have…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>This discovery paved the way for…</span><span>If [person] hadn't [action], it is conceivable that…</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Reading Comprehension</div><div class="sb"><span class="tbadge">Reading Comprehension</span><div class="rtext short-r"><p>CRISPR-Cas9 is a gene-editing technology that allows scientists to precisely modify DNA in living organisms. Developed in 2012 by Jennifer Doudna and Emmanuelle Charpentier — who received the 2020 Nobel Prize — CRISPR has made genetic editing faster, cheaper and more accurate than any previous technique. Applications range from eliminating hereditary diseases to developing disease-resistant crops. However, germline editing — modifying genes in embryos — creates heritable changes passed to future generations. Critics argue this crosses a boundary that humanity should approach with extreme caution, since the full consequences cannot currently be predicted.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Identify type and answer. Click to reveal.</p><ol class="exlist"><li>What three qualities made CRISPR different from previous techniques? <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Factual</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Faster, cheaper, more accurate</span></span><div class="lines"><div></div></div></li><li>The word 'heritable' means: a) permanent b) passed to offspring c) dangerous d) uncontrollable → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">b</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Vocabulary</span></span></em><div class="lines"><div></div></div></li><li>'Cannot currently be predicted' implies: a) scientists expect negative results b) too new to test c) knowledge may improve but risks are unknown d) CRISPR should stop → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">c</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Inference</span></span></em><div class="lines"><div></div></div></li><li>Why does the author mention 'germline editing'? → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose: to identify the most ethically sensitive application</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose</span></span></em><div class="lines"><div></div></div></li></ol></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Science & Discoveries</div><div class="sb"><div class="spq"><ol class="exlist"><li>What is the most important scientific discovery in human history? Defend your choice.</li><li>Do scientists have a responsibility to consider ethical implications before publishing?</li><li>If you could fund any scientific project right now, what would it be?</li></ol></div><div class="game-box"><p class="game-name">Greatest Invention Debate</p><p class="game-desc">Work in groups of 4. Each person is assigned: printing press / internet / antibiotics / the wheel. Prepare 2 minutes. Argue your case for 45 seconds. Then vote — you CANNOT vote for your own. The winning argument persuades the most people to change their initial view.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 12 — Crime & Mystery</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 12 — Crime & Mystery</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Crime & Mystery</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>suspect</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>motive</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>alibi</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>evidence</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>witness</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>verdict</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>confess</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>a red herring</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a person thought to be guilty of a crime, but not yet proven so</div><div class="di2"><b>b.</b>&ensp;a reason for doing something, especially committing a crime</div><div class="di2"><b>c.</b>&ensp;evidence proving someone was elsewhere when a crime occurred</div><div class="di2"><b>d.</b>&ensp;information used to prove whether something is true or false</div><div class="di2"><b>e.</b>&ensp;a person who sees a crime or event take place</div><div class="di2"><b>f.</b>&ensp;the official decision made by a judge or jury at the end of a trial</div><div class="di2"><b>g.</b>&ensp;to admit that you have done something wrong or illegal</div><div class="di2"><b>h.</b>&ensp;a misleading detail that leads investigators away from the truth</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>suspect</em>&ensp;·&ensp;<em>motive</em>&ensp;·&ensp;<em>alibi</em>&ensp;·&ensp;<em>evidence</em>&ensp;·&ensp;<em>witness</em>&ensp;·&ensp;<em>verdict</em>&ensp;·&ensp;<em>confess</em>&ensp;·&ensp;<em>red herring</em></div><ol class="exlist"><li>The detective spent weeks gathering <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">evidence</span></span> before presenting her case to the court.<div class="lines"><div></div></div></li><li>The jury deliberated for three days before returning a guilty <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">verdict</span></span>.<div class="lines"><div></div></div></li><li>The initial theory turned out to be a <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">red herring</span></span> — the real crime was entirely different.<div class="lines"><div></div></div></li><li>Without a clear <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">motive</span></span>, it was impossible to understand why anyone would commit such an act.<div class="lines"><div></div></div></li><li>His <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">alibi</span></span> was confirmed by three independent <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">witnesses</span></span> who placed him kilometres away.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write three sentences using today's vocabulary — each in a complex clause, not a simple definition. At least one must contain a cleft structure from today's grammar.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Cleft Sentences for Emphasis</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Cleft Sentences for Emphasis</p><div class="gex"><p><strong>It + be + [focus] + that/who…</strong> → <em>It was the security guard who noticed the missing file.</em></p><p><strong>What + S + V + be + [focus]</strong> → <em>What surprised everyone was the alibi.</em></p><p><strong>It wasn't until… that…</strong> → <em>It wasn't until they read the letter that they understood the motive.</em></p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>The detective found the key piece of evidence. (It was…who) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">It was the detective who found the key piece of evidence.</span></span><div class="lines"><div></div></div></li><li>The witness's testimony changed everything. (What…was) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">What changed everything was the witness's testimony.</span></span><div class="lines"><div></div></div></li><li>They understood the motive after reading the letter. (It wasn't until…that) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">It wasn't until they read the letter that they understood the motive.</span></span><div class="lines"><div></div></div></li><li>The simplicity of the plan made it so effective. (What…was) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">What made the plan so effective was its simplicity.</span></span><div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>It was the detective which solved the case in the end.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ who (not 'which' for people)</span></span><div class="lines"><div></div></div></li><li>What it surprised the jury was the calmness of the defendant.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ What surprised the jury was… (remove 'it')</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Rewrite the paragraph below so it contains at least THREE cleft sentences. Explain one of your choices in the margin.</p><div class="rtext short-r"><p>A young detective noticed a small detail others had missed. The detail was a partial fingerprint on the window ledge. This fingerprint identified the only person who could have entered the building. The case closed because of this single observation.</p></div><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Psychology of False Confessions</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Why do you think an innocent person might confess to a crime they didn't commit?</div><div class="rtext"><div class="rtitle">The Psychology of False Confessions</div><p>It is one of the most counterintuitive phenomena in criminal justice: people who are entirely innocent sometimes confess to crimes they did not commit. Research by the Innocence Project has found that false confessions feature in approximately 29% of cases where people were later proven innocent through DNA evidence.</p><p>Psychologists identify three main types. The first is <em>voluntary</em>: an individual confesses without external pressure, often due to mental illness or a desire to protect someone else. The second is <em>compliant</em>: the suspect knows they are innocent but confesses under extreme interrogation pressure, calculating they can prove innocence later. The third is <em>internalised</em>: under sustained questioning, the suspect genuinely begins to doubt their own memory and comes to believe they committed the act.</p><p>Interrogation techniques play a significant role. Methods including sleep deprivation, isolation, false evidence and highly detailed repetitive questioning can cause individuals to construct 'memories' of events that never happened. Reform advocates argue for mandatory recording of interrogations, limits on duration, and restrictions on deceptive tactics — measures several countries have already adopted.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What surprising statistic does the Innocence Project's research reveal?<div class="lines"><div></div><div></div><div></div></div></li><li>Explain the difference between a 'compliant' and an 'internalised' false confession.<div class="lines"><div></div><div></div><div></div></div></li><li>Name two interrogation techniques that can lead to false confessions.<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-~29% of proven-innocent cases involved false confessions 2-Compliant: knows innocent but confesses under pressure; Internalised: genuinely comes to believe they did it 3-Any two: sleep deprivation/isolation/false evidence/repetitive detailed questioning</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>to officially declare someone not guilty (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">exonerate</span></span><div class="lines"><div></div></div></li><li>the person who actually committed a crime (implied): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">perpetrator</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text. Use evidence from the text and your own experience.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Write the opening of a mystery story. Yo…</div><div class="sb"><div class="pbox">Write the opening of a mystery story. Your first sentence must make the reader want to continue.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Setting</strong>When and where? Establish atmosphere immediately.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Suspicious character + unexplained detail</strong>Introduce naturally — do NOT announce they are suspicious. Plant one clue.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Final sentence</strong>Create tension. Leave a question unanswered.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>The rain had been falling for three hours when…</span><span>What she noticed first was not what was there, but what was missing.</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>It wasn't until she turned the envelope over that she realised…</span><span>What the detective couldn't explain was…</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Listening + Summary</div><div class="sb"><span class="tbadge">Integrated Listening + Summary</span><p class="exinst">Teacher reads a news report (~120 seconds). Take notes, then answer questions and write a 4-sentence summary.</p><div class="plan-grid"><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>What happened?</strong><div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>Key facts confirmed</strong><div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>What is still unknown?</strong><div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>What happens next?</strong><div class="lines"><div></div><div></div></div></div></div></div><p class="exlabel">4-Sentence Written Summary</p><p class="exinst">S1 — what happened. S2 — what is confirmed. S3 — what is uncertain. S4 — what happens next.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Crime & Mystery</div><div class="sb"><div class="spq"><ol class="exlist"><li>Do you think the criminal justice system is generally fair? What would you change?</li><li>Is it ever morally acceptable to lie in order to protect someone you love?</li><li>What makes a mystery story so compelling? Why are humans so drawn to unsolved questions?</li></ol></div><div class="game-box"><p class="game-name">The Alibi Game</p><p class="game-desc">Work in pairs. You have 3 minutes to invent a shared alibi for where you both were between 9pm and midnight last night. Must be detailed, consistent and believable. Then interrogated separately by another pair — one partner waits outside. Interrogators look for inconsistencies. Did your alibi hold up?</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 13 — Fashion & Identity</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 13 — Fashion & Identity</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Fashion & Identity</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>trend</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>sustainable</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>vintage</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>fast fashion</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>make a statement</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>impression</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>fabric</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>acquired taste</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;a general direction that fashion or behaviour is currently moving in</div><div class="di2"><b>b.</b>&ensp;designed so as not to damage the environment long-term</div><div class="di2"><b>c.</b>&ensp;clothing from an earlier era, valued for quality or style</div><div class="di2"><b>d.</b>&ensp;cheap clothing produced quickly in response to trends, at environmental cost</div><div class="di2"><b>e.</b>&ensp;to express a strong opinion or identity through your appearance</div><div class="di2"><b>f.</b>&ensp;the effect or image you create in someone else's mind</div><div class="di2"><b>g.</b>&ensp;the material used for making clothing</div><div class="di2"><b>h.</b>&ensp;something enjoyed only after experiencing it several times</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>trend</em>&ensp;·&ensp;<em>sustainable</em>&ensp;·&ensp;<em>vintage</em>&ensp;·&ensp;<em>fast fashion</em>&ensp;·&ensp;<em>make a statement</em>&ensp;·&ensp;<em>impression</em>&ensp;·&ensp;<em>fabric</em></div><ol class="exlist"><li>She prefers <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">sustainable</span></span> brands that use recycled materials and pay workers fairly.<div class="lines"><div></div></div></li><li>The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">fabric</span></span> this shirt is made from feels incredibly soft — must be high quality.<div class="lines"><div></div></div></li><li>He wanted to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">make a statement</span></span> at the interview, so he chose the most distinctive item he owned.<div class="lines"><div></div></div></li><li>The move away from <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">fast fashion</span></span> towards durable clothing is a growing <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">trend</span></span>.<div class="lines"><div></div></div></li><li>Her style makes a strong <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">impression</span></span> — you notice her the moment she enters a room.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose THREE phrases from today's vocabulary. For each, write one sentence that is specific and vivid — create a clear image, not just a definition in disguise.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Nominalization — Academic Register</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Nominalization — Academic Register</p><div class="gex"><p>Verb → Noun: <em>pollute → pollution / discover → discovery / produce → production</em></p><p>Adjective → Noun: <em>sustainable → sustainability / equal → equality</em></p><p>Informal: 'Fast fashion pollutes a lot.' → Formal: '<em>The environmental impact of fast fashion production</em> is substantial.'</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>Celebrities influence teenagers a lot. (influence) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Celebrity/Influencer influence</span></span> on teenage consumers is considerable.<div class="lines"><div></div></div></li><li>Sustainable practices are becoming more popular. (adoption) → The <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">adoption</span></span> of sustainable practices is growing globally.<div class="lines"><div></div></div></li><li>Young people buy too many clothes. (consumption) → Youth clothing <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">consumption</span></span> levels have increased significantly.<div class="lines"><div></div></div></li><li>Designers are becoming more aware of environmental issues. (awareness) → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Environmental awareness</span></span> among fashion designers is increasing.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>Fashion designers are becoming more aware of environmental issues. F / I<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ I → Environmental awareness among fashion designers is increasing.</span></span><div class="lines"><div></div></div></li><li>People buy too many clothes they never wear. F / I<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ I → The excessive purchase of unworn clothing is a significant trend.</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write a 4-sentence formal paragraph about fashion and identity. Your paragraph must contain at least THREE nominalized noun phrases. Underline each one.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The True Cost of a T-Shirt</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Look at the label on a piece of clothing you're wearing. Where was it made?</div><div class="rtext"><div class="rtitle">The True Cost of a T-Shirt</div><p>A fast-fashion T-shirt typically retails for the equivalent of a few dollars. Given the cost of fabric, stitching, transport, packaging, retail margin and advertising — and still leaving profit for shareholders — it is worth pausing to ask: what has been compressed to make this price possible?</p><p>The answer, in most cases, is labour. Most fast-fashion garments are manufactured in countries where wages are low and workers have little bargaining power. In Bangladesh, one of the world's largest garment exporters, the minimum wage for factory workers remains significantly below a calculated 'living wage'. Workers, the majority of whom are women, often work twelve-hour shifts in facilities that have faced serious safety violations.</p><p>The environmental costs are equally significant. The fashion industry accounts for approximately 10% of global carbon emissions — more than aviation and shipping combined. A single pair of jeans requires roughly 7,500 litres of water to produce. Synthetic fabrics shed microplastics with every wash, entering food chains worldwide.</p><p>In response to growing consumer awareness, many brands have launched 'sustainable' collections. Critics argue these are frequently 'greenwashing' — designed to reassure consumers without addressing structural problems. Genuine sustainability, they argue, is incompatible with the fast-fashion model, which depends on volume, speed and artificially low prices.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What does the author imply has been 'compressed' to make a T-shirt so cheap?<div class="lines"><div></div><div></div><div></div></div></li><li>What is the difference between a 'minimum wage' and a 'living wage' as implied in the text?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the author mean by 'greenwashing'?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Labour costs (wages) 2-Minimum wage is the legal floor; living wage is what's needed for basic needs — often much higher 3-Creating an environmentally positive image without genuinely changing harmful practices</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>the power to negotiate better conditions (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">bargaining power</span></span><div class="lines"><div></div></div></li><li>done only on the surface, without real change (§4): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">superficial</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Fashion is more about identity than it is abo…</div><div class="sb"><div class="pbox">Fashion is more about identity than it is about appearance. Do you agree or disagree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Thesis</strong>Your position using a nominalized phrase. Be precise.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Arguments</strong>Two reasons, OR one reason + a counterargument honestly addressed.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Conclusion</strong>Restate your view — do NOT simply repeat the introduction.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>The relationship between fashion and identity is…</span><span>Clothing choices often reflect…</span><span>While it is true that…, the evidence suggests…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>The construction of identity through dress is…</span><span>Fashion functions not merely as…but as a form of…</span><span>A more nuanced position would acknowledge both…and…</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Reading Comprehension</div><div class="sb"><span class="tbadge">Reading Comprehension</span><div class="rtext short-r"><p>The global fashion industry is worth approximately three trillion US dollars. Despite growing awareness of its environmental impact, demand continues to rise, driven partly by social media, which has accelerated the speed at which trends emerge and disappear. Research suggests the average consumer now buys 60% more clothing than in 2000 but keeps each garment for half as long. Without significant structural change, fashion's carbon footprint is projected to increase by 26% by 2030. Critics argue that voluntary sustainability commitments are insufficient without binding international regulation.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Identify type and answer. Click to reveal.</p><ol class="exlist"><li>What role has social media played in the fashion industry? <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Factual</span></span></em> → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Accelerated the speed at which trends emerge/disappear</span></span><div class="lines"><div></div></div></li><li>'Binding international regulation' means: a) optional recommendations b) legally enforceable rules c) agreements between brands d) UN targets → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">b</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Vocabulary</span></span></em><div class="lines"><div></div></div></li><li>What can be inferred about voluntary commitments? → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">b: critics see them as insufficient alone</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Inference</span></span></em><div class="lines"><div></div></div></li><li>Why does the author include the statistics (60%, half as long, 26%)? → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose: to give concrete scale and direction to the problem</span></span> <em>Type: <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Purpose</span></span></em><div class="lines"><div></div></div></li></ol></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Fashion & Identity</div><div class="sb"><div class="spq"><ol class="exlist"><li>Does what you wear genuinely express who you are, or do you dress mainly for social acceptance?</li><li>Is it possible to care deeply about fashion and also care about the environment?</li><li>Would you pay significantly more for clothing if you knew it was genuinely ethically produced?</li></ol></div><div class="game-box"><p class="game-name">Style a Character</p><p class="game-desc">Work in groups of 3. Draw a character card: 1) Retired astronaut at their first job interview back on Earth. 2) Time traveller from 1924 trying to fit into the modern world. 3) Teenager wearing only vintage clothing for one year. Design an outfit in 3 minutes using today's vocabulary. Present in 60 seconds. Class votes: most creative AND most wearable.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 14 — The Future</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 14 — The Future</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · The Future</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>automation</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>artificial intelligence</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>renewable</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>innovation</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>forecast</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>disrupt</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>on the verge of</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>virtual reality</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;the use of technology to perform tasks without human involvement</div><div class="di2"><b>b.</b>&ensp;computer systems that can perform tasks normally requiring human intelligence</div><div class="di2"><b>c.</b>&ensp;energy from a source naturally replenished, such as sun or wind</div><div class="di2"><b>d.</b>&ensp;the introduction of a new idea, method, product or technology</div><div class="di2"><b>e.</b>&ensp;a prediction of future events, especially based on data</div><div class="di2"><b>f.</b>&ensp;to radically challenge or change an established industry</div><div class="di2"><b>g.</b>&ensp;about to do or experience something significant</div><div class="di2"><b>h.</b>&ensp;a computer-generated simulation of a three-dimensional environment</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>automation</em>&ensp;·&ensp;<em>artificial intelligence</em>&ensp;·&ensp;<em>renewable</em>&ensp;·&ensp;<em>innovation</em>&ensp;·&ensp;<em>forecast</em>&ensp;·&ensp;<em>disrupt</em>&ensp;·&ensp;<em>on the verge of</em>&ensp;·&ensp;<em>virtual reality</em></div><ol class="exlist"><li>According to economists, <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">automation</span></span> / <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">artificial intelligence</span></span> will replace up to 40% of jobs within two decades.<div class="lines"><div></div></div></li><li>Solar and wind power are the fastest-growing sources of <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">renewable</span></span> energy worldwide.<div class="lines"><div></div></div></li><li><span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Virtual reality</span></span> in medicine allows surgeons to train without risk to real patients.<div class="lines"><div></div></div></li><li>The latest economic <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">forecast</span></span> suggests growth will slow significantly in the coming year.<div class="lines"><div></div></div></li><li>Electric aircraft seem <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">on the verge of</span></span> becoming commercially viable for short-haul routes.<div class="lines"><div></div></div></li><li>Fintech startups continue to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">disrupt</span></span> the traditional banking sector with faster alternatives.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst"><em>Automation</em> and <em>artificial intelligence</em> are related but distinct. Write one sentence correctly using each, and one sentence that makes the distinction clear to someone who has confused the two. Click to reveal model answers when you are done.</p><div class="lines"><div></div><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Mixed Conditionals</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Mixed Conditionals</p><div class="gex"><p>Structure: <strong>If + had + past participle , would + base form</strong> (present result)</p><p>If we <em>had invested</em> in renewables sooner, we <em>wouldn't be facing</em> this crisis now.</p><p>Compare: Pure 3rd = past cause, PAST result. Mixed = past cause, PRESENT result.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>If scientists <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had developed</span></span> (develop) better batteries earlier, electric cars <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would be</span></span> (be) more affordable today.<div class="lines"><div></div></div></li><li>If the internet <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">hadn't been invented</span></span> (not/be invented), globalisation <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would look</span></span> (look) completely different now.<div class="lines"><div></div></div></li><li>If she <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had learned</span></span> (learn) to code at school, she <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">would probably have</span></span> (probably/have) a much higher salary right now.<div class="lines"><div></div></div></li><li>If governments <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">had taken</span></span> (take) stronger climate action in the 1990s, we <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">wouldn't be facing</span></span> (not/face) such extreme weather today.<div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>If she would have applied for that job last year, she would have got it.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ If she had applied…</span></span><div class="lines"><div></div></div></li><li>If I would have chosen engineering at university, I would work in tech now.<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ If I had chosen… (would work — present result)</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Write four mixed conditional sentences about technological choices society has made. Each should explore a real past cause and its present consequence. Use different subjects.</p><div class="lines"><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · Will AI Replace Your Teacher?</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Which parts of a teacher's job do you think a machine could do? Which could never be replaced?</div><div class="rtext"><div class="rtitle">Will AI Replace Your Teacher?</div><p>The idea of artificial intelligence entering the classroom is no longer science fiction. Adaptive learning platforms already adjust exercise difficulty in real time based on individual student performance. AI tutoring systems can identify specific areas of confusion with greater speed and accuracy than most human teachers managing thirty students.</p><p>For proponents, the promise is compelling: personalised instruction at scale, available to any student regardless of geography or income. In countries where teacher shortages are severe and educational inequality is significant, AI tools could theoretically reach students who currently have access to nothing.</p><p>Yet most educators are unconvinced that AI can replicate — or should replace — the full scope of what teaching involves. A teacher does not simply transmit information. They read a room, sense anxiety, encourage a student who has stopped believing in themselves, and create conditions in which learning feels meaningful rather than merely efficient. These capacities require emotional intelligence and cultural awareness that current AI systems do not possess.</p><p>The more likely future, most researchers agree, is transformation rather than replacement. AI will handle routine tasks — drilling vocabulary, generating exercises, providing instant feedback — freeing human teachers to focus on the genuinely human dimensions of education.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What can AI tutoring systems do that human teachers cannot always do as easily in large classes?<div class="lines"><div></div><div></div><div></div></div></li><li>What argument do proponents of AI in education make?<div class="lines"><div></div><div></div><div></div></div></li><li>What does the text say the 'more likely future' for AI in education is?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Identify confusion faster/more accurately in large groups 2-Personalised instruction at scale regardless of geography/wealth 3-Transformation not replacement: AI handles routine tasks, humans focus on human dimensions</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>matched or equalled in quality (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">rivalling / rival</span></span><div class="lines"><div></div></div></li><li>convincing and interesting (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">compelling</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · What will school, work, or daily life look li…</div><div class="sb"><div class="pbox">What will school, work, or daily life look like in 2050?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Introduction</strong>Which aspect? Why is it interesting to predict?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Predictions</strong>2 specific changes. Use: may / might / is likely to / could potentially<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>What won't change</strong>One constant — and a convincing reason why.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>By 2050, it seems likely that…</span><span>This shift may be driven by…</span><span>While technology will transform…, it is unlikely to…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>If society had acted differently in the 2020s, we might now be…</span><span>The most significant transformation is not likely to be technological, but…</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Integrated Speaking Task</div><div class="sb"><span class="tbadge">Integrated Speaking Task</span><div class="rtext short-r"><p>Automation is expected to eliminate between 400 million and 800 million jobs globally by 2030. Workers in manufacturing, retail, food service and transportation face the greatest risk. Economists argue that new types of jobs will emerge to compensate for those lost, as in previous industrial revolutions. Critics note, however, that the speed of this transition may outpace workers' ability to retrain, particularly where educational infrastructure is weak.</p></div><p class="exlabel">Notes</p><div class="notes-box"><div></div><div></div><div></div><div></div></div><div class="pbox">How does the lecture agree with or challenge the reading's claims? Use specific details from both sources.</div><ul class="chk"><li><span class="cb"></span>I referenced a specific detail from the reading.</li><li><span class="cb"></span>I referenced a specific detail from the lecture.</li><li><span class="cb"></span>I described the relationship (agreement / challenge / extension).</li><li><span class="cb"></span>I used reporting verbs and did not state my own opinion.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · The Future</div><div class="sb"><div class="spq"><ol class="exlist"><li>If you could live in the year 2100, would you? What concerns you most about what the world might be like?</li><li>Will AI make people's lives better or worse on balance? Think of three reasons for each side, then decide.</li><li>What skill or quality do you think will be most valuable in 2050 that is undervalued today?</li></ol></div><div class="game-box"><p class="game-name">Future Headlines</p><p class="game-desc">Write 3 newspaper headlines from 2075 — plausible, specific and thought-provoking. You have 3 minutes. Share with a partner: explain why each is realistic based on current trends. Class vote: most believable AND most unsettling.</p></div></div></div>`,
`<div class="ph-hd"><strong>Day 15 — Social Issues & Fairness</strong>Name: _________________________&ensp;Date: _____________</div><div class="day-hd"><h2>Day 15 — Social Issues & Fairness</h2></div><div class="phase-lbl">Focus Phase</div><div class="ds vocab"><div class="sh"><span class="si">📝</span>Vocabulary · Social Issues & Fairness</div><div class="sb"><div class="exset"><p class="exlabel">A</p><p class="exinst">Click a box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="a" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;<em>equality</em></div><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;2.&ensp;<em>discrimination</em></div><div class="mi"><span class="ab mt-box" data-ans="c" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;3.&ensp;<em>privilege</em></div><div class="mi"><span class="ab mt-box" data-ans="d" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;4.&ensp;<em>awareness</em></div><div class="mi"><span class="ab mt-box" data-ans="e" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;5.&ensp;<em>campaign</em></div><div class="mi"><span class="ab mt-box" data-ans="f" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;6.&ensp;<em>systemic</em></div><div class="mi"><span class="ab mt-box" data-ans="g" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;7.&ensp;<em>accountability</em></div><div class="mi"><span class="ab mt-box" data-ans="h" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;8.&ensp;<em>level the playing field</em></div></div><div class="mdefs"><div class="di2"><b>a.</b>&ensp;the state of being treated the same and having the same opportunities</div><div class="di2"><b>b.</b>&ensp;unfair treatment based on identity factors such as race, gender or background</div><div class="di2"><b>c.</b>&ensp;a special advantage enjoyed by a particular group, often unearned</div><div class="di2"><b>d.</b>&ensp;knowledge and understanding of a problem or situation</div><div class="di2"><b>e.</b>&ensp;an organised effort to bring about social or political change</div><div class="di2"><b>f.</b>&ensp;relating to problems embedded in a whole system, not just individual cases</div><div class="di2"><b>g.</b>&ensp;responsibility for one's actions; the obligation to explain and justify decisions</div><div class="di2"><b>h.</b>&ensp;to remove unfair advantages so that everyone has equal opportunities</div></div></div><p class="mt-hint">Click a box to reveal its letter</p></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Complete each sentence. Click the blank to reveal.</p><div class="wbank"><em>equality</em>&ensp;·&ensp;<em>discrimination</em>&ensp;·&ensp;<em>privilege</em>&ensp;·&ensp;<em>awareness</em>&ensp;·&ensp;<em>campaign</em>&ensp;·&ensp;<em>systemic</em>&ensp;·&ensp;<em>accountability</em>&ensp;·&ensp;<em>level the playing field</em></div><ol class="exlist"><li>The government launched a public <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">campaign</span></span> to raise <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">awareness</span></span> about the gender pay gap.<div class="lines"><div></div></div></li><li>Many researchers argue poverty is not an individual failure but a <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">systemic</span></span> problem requiring structural solutions.<div class="lines"><div></div></div></li><li>Students from wealthier backgrounds often have <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">privilege</span></span> that affects outcomes in ways most don't notice.<div class="lines"><div></div></div></li><li>In order to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">level the playing field</span></span>, schools in disadvantaged areas need additional funding, not equal funding.<div class="lines"><div></div></div></li><li>The organisation holds corporations to <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">accountability</span></span> for the environmental damage they cause.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Many people confuse <em>equality</em> and <em>equity</em>. Write two sentences: one correctly using <em>equality</em> and one using <em>equity</em> (not on today's list, but an important C1 term), making the distinction unmistakably clear.</p><div class="lines"><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Hedging Language for Balanced, Analytical Claims</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Hedging Language for Balanced, Analytical Claims</p><div class="gex"><p>Absolute: 'Social media <em>destroys</em> attention spans.' → Hedged: 'Heavy use <strong>appears associated with</strong> shorter concentration spans.'</p><p>Toolkit: <em>tends to / appears to / is likely to / evidence suggests / in many cases / may / research indicates</em></p><p>Note: Hedging ≠ weak writing. Over-hedging ('it might perhaps possibly suggest') is also a problem.</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Complete. Click the blank to reveal.</p><ol class="exlist"><li>Social media causes depression in teenagers. → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Heavy social media use tends to be associated with higher rates of depression among teenagers.</span></span><div class="lines"><div></div></div></li><li>Schools fail students from disadvantaged backgrounds. → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Schools often struggle to fully support students from disadvantaged backgrounds.</span></span><div class="lines"><div></div></div></li><li>Money determines success in life. → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Socioeconomic background appears to be strongly associated with life outcomes in many contexts.</span></span><div class="lines"><div></div></div></li><li>Standardised tests are unfair to students from poorer families. → <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">Standardised tests may disadvantage students from lower-income backgrounds, according to some research.</span></span><div class="lines"><div></div></div></li></ol></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find and correct ONE error. Click the arrow to reveal the correction.</p><ol class="exlist"><li>It is entirely possible that in some cases research might perhaps suggest a possible link between sleep and memory. ✓/✗<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ ✗ Over-hedged: Research suggests sleep plays an important role in memory consolidation.</span></span><div class="lines"><div></div></div></li><li>Social inequality always and without exception leads to worse educational outcomes. ✓/✗<span class="arv ec-rv" onclick="this.classList.toggle('shown')"><span class="agap">→ ?</span><span class="aval">→ ✗ Unhedged: Social inequality tends to be associated with poorer educational outcomes in many contexts.</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Take one strong personal view — social, political or educational. Write it as an absolute claim, then rewrite it three times with progressively more nuanced hedging. Which version is most convincing and why?</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="phase-lbl">Practice Phase</div><div class="ds reading"><div class="sh"><span class="si">📖</span>Reading · The Postcode Lottery: Does Your Address Determine Your Future?</div><div class="sb"><div class="pre-q"><strong>Before you read:</strong> Do you think where you grow up affects your chances in life? In what specific ways?</div><div class="rtext"><div class="rtitle">The Postcode Lottery: Does Your Address Determine Your Future?</div><p>Across most developed nations, the most reliable predictor of a child's educational attainment is not their intelligence, work ethic, or the quality of their school. It is their parents' income. The relationship between socioeconomic background and academic achievement is so consistent that researchers treat it as one of the most robust findings in educational science.</p><p>The mechanisms are not hard to identify. Children from lower-income families are more likely to live in overcrowded housing, experience food insecurity, and lack access to enrichment activities — music lessons, sports clubs, educational travel — that build skills and confidence. They are also less likely to have parents with the time, energy or educational background to support learning at home.</p><p>Schools attempt to compensate, but rarely succeed in eliminating the gap. Funding systems in many countries allocate resources based on per-pupil formulas that treat all pupils equally — regardless of vastly different starting points. As a result, children who need more support receive the same funding as those who need less.</p><p>Some countries have adopted equity-based funding models that direct additional resources to schools serving disadvantaged populations. Research shows significant improvements in outcomes where these programmes are properly implemented. Yet scaling them is politically difficult: they require redistributing resources from those who already have them.</p></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Answer in your own words.</p><ol class="exlist open-qs"><li>What does the text identify as the strongest predictor of educational achievement?<div class="lines"><div></div><div></div><div></div></div></li><li>Name three specific disadvantages children from lower-income families face.<div class="lines"><div></div><div></div><div></div></div></li><li>What is the problem with funding systems that treat 'all pupils equally'?<div class="lines"><div></div><div></div><div></div></div></li></ol><div class="akey screen-key"><span class="ak-lbl">Key ▸</span><span class="ak-body">1-Parents' income/socioeconomic background 2-Any three: overcrowded housing / food insecurity / lack of enrichment activities / less parental support 3-Give the same resources to children with very different starting points</span></div></div><div class="exset"><p class="exlabel">B</p><p class="exinst">Find words that match these meanings. Click to reveal.</p><ol class="exlist"><li>the level of success achieved in education (§1): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">attainment</span></span><div class="lines"><div></div></div></li><li>activities that add quality beyond the basics (§2): <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">enrichment activities</span></span><div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">⭐ Write 4–5 sentences developing your own critical response to a key idea from the text.</p><div class="lines"><div></div><div></div><div></div><div></div><div></div></div></div></div></div><div class="ds writing"><div class="sh"><span class="si">✍️</span>Writing · Education should be free for everyone. Do you…</div><div class="sb"><div class="pbox">Education should be free for everyone. Do you agree or disagree?</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">1</div><div class="ps-body"><strong>Thesis</strong>Your position + core reason in one sentence. 'I agree' alone is not a thesis.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">2</div><div class="ps-body"><strong>Argument 1 + Counter-argument</strong>Your strongest reason + evidence, then acknowledge the opposing view and respond to it.<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Conclusion</strong>Restate with a forward-looking or impact statement.<div class="lines"><div></div><div></div></div></div></div></div><div class="langbox"><div class="lb-sec"><div class="lb-lbl">B2 Language</div><span>Access to education is…, and therefore…</span><span>Evidence suggests that free education tends to…</span><span>While critics argue that…, the data indicates…</span></div><div class="lb-sec c1-sec"><div class="lb-lbl">⭐ C1 Language</div><span>A society where education is freely accessible is likely to…</span><span>The counterargument that…rests on the assumption that…— which research challenges.</span></div></div><p class="wc-note">Target: 200–260 words</p></div></div><div class="ds toefl"><div class="sh"><span class="si">🎯</span>TOEFL · Independent Writing Task — TOEFL Format</div><div class="sb"><span class="tbadge">Independent Writing Task — TOEFL Format</span><p class="exinst">Write a response to the prompt below. Aim for 250–300 words.</p><div class="pbox">Some people believe social media gives everyone an equal voice. Others disagree. Discuss both views and give your opinion.</div><div class="plan-grid"><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>View 1</strong> — strongest arguments<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>View 2</strong> — strongest arguments<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>Your position</strong> + best argument<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">✎</div><div class="ps-body"><strong>Counter-argument to address</strong><div class="lines"><div></div><div></div></div></div></div></div><ul class="chk"><li><span class="cb"></span>Both views present and treated fairly.</li><li><span class="cb"></span>Writer's position clearly stated.</li><li><span class="cb"></span>At least one specific example given.</li><li><span class="cb"></span>At least two hedging phrases used.</li><li><span class="cb"></span>Counter-argument acknowledged and addressed.</li></ul></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Social Issues & Fairness</div><div class="sb"><div class="spq"><ol class="exlist"><li>Do you think the school you attended has affected your opportunities in life? Be honest.</li><li>Is inequality inevitable in any society, or can it genuinely be solved?</li><li>What is the difference between treating people equally and treating them fairly? Give an example where the two conflict.</li></ol></div><div class="game-box"><p class="game-name">Four Corners Debate</p><p class="game-desc">Corners: Strongly Agree / Agree / Disagree / Strongly Disagree. After each statement, move to your corner and defend your view for 20 seconds. You may change position if persuaded. Statements: 1) Hard work matters more than background when it comes to success. 2) The government has a responsibility to ensure equal educational opportunities. 3) People with privilege have an obligation to use it to help others.</p></div></div></div>`,
