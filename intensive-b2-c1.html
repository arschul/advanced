iv class="lines"><div></div></div></li><li>Be <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">concise</span></span> — a powerful presentation is rarely the longest one in the room.<div class="lines"><div></div></div></li><li>When you <span class="arv" onclick="this.classList.toggle('shown')"><span class="agap"></span><span class="aval">acknowledge</span></span> the opposing view before challenging it, your argument becomes more persuasive.<div class="lines"><div></div></div></li></ol></div><div class="c1box"><div class="c1lbl">⭐ C1 Challenge</div><p class="exinst">Choose the ONE word from today's list you think is most important for an effective presentation. Write a sentence justifying your choice — and make sure the sentence itself demonstrates the quality you're describing.</p><div class="lines"><div></div><div></div></div></div></div></div><div class="ds grammar"><div class="sh"><span class="si">⚙️</span>Grammar · Presentation Signposting Language</div><div class="sb"><div class="gbox"><div class="gbox-lbl">Grammar Focus</div><p class="gfocus">Use signposting phrases to help your audience follow the structure. Each phrase has a specific function.</p><div class="gex"><p><strong>Introducing:</strong> Today I will examine… / This presentation addresses the question of…</p><p><strong>Moving forward:</strong> Moving on to… / Turning now to…</p><p><strong>Contrasting:</strong> However… / In contrast… / On the other hand…</p><p><strong>Summarising:</strong> In summary… / To conclude… / The key takeaway is…</p></div></div><div class="exset"><p class="exlabel">A</p><p class="exinst">Match each phrase to its function. Click the box to reveal the correct letter.</p><div class="mgrid"><div class="mwords"><div class="mi"><span class="ab mt-box" data-ans="b" onclick="this.textContent=this.dataset.ans;this.classList.add('revealed')"></span>&thinsp;1.&ensp;"Moving on to my second point…"</div><div class="mi"><span class="a ccurate grammar? Minimal filler?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">3</div><div class="ps-body"><strong>Topic Development</strong> (1–5)<br>Argument clear? Claims supported? Logical flow?<div class="lines"><div></div><div></div></div></div></div><div class="plan-step"><div class="ps-num">4</div><div class="ps-body"><strong>Reflection</strong><br>Strongest moment? What would you change?<div class="lines"><div></div><div></div></div></div></div></div></div></div><div class="phase-lbl">Speaking Phase</div><div class="ds speaking"><div class="sh"><span class="si">💬</span>Speaking · Presentations & Closing</div><div class="sb"><div class="spq"><ol class="exlist"><li>What is the hardest part of speaking in public for you? Has that changed during this course?</li><li>What made the most convincing presentation you heard today effective?</li><li>Is presenting in a foreign language harder or easier than in your first language?</li></ol></div><div class="game-box"><p class="game-name">Awards Ceremony</p><p class="game-desc">Class votes for: Clearest Explanation / Strongest Evidence / Best Opening Line / Most Persuasive / Best Delivery / Most Surprising Topic / Best Vocabulary Use. Each winner delivers a 20-second acceptance speech: 'The key idea behind my talk was…'</p></div></div></div>`,

// Shuffle matching definitions so answers are not 1=a, 2=b, 3=c
function shuffleMatchGrid(container) {
  container.querySelectorAll('.mgrid').forEach(function(grid) {
    var boxes = Array.from(grid.querySelectorAll('.mt-box'));
    var defs  = Array.from(grid.querySelectorAll('.di2'));
    var n = defs.length;
    if (!n || !boxes.length || boxes[0].classList.contains('revealed')) return;

    // Fisher-Yates shuffle
    var order = Array.from({length:n},function(_,i){return i;});
    for (var i=n-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}

    // Extract definition text robustly: clone, remove the <b> letter child, take the rest
    var origText = defs.map(function(el){
      var clone = el.cloneNode(true);
      var b = clone.querySelector('b');
      if (b) b.remove();
      return clone.innerHTML.replace(/^[\s\u00a0\u2002\u2003]+/,'');
    });

    // Rewrite definitions with shuffled content, preserving the letter label
    defs.forEach(function(el,i){
      var letter = String.fromCharCode(97+i);
      var wordIdx = order[i];
      el.innerHTML = '<b>'+letter+'.</b>&ensp;'+origText[wordIdx];
    });

    // Remap data-ans: for word j, find which position its text ended up at
    var newPos = {};
    order.forEach(function(wordIdx,pos){ newPos[wordIdx]=pos; });
    boxes.forEach(function(box,j){
      box.dataset.ans = String.fromCharCode(97+newPos[j]);
    });
  });
}

// Run shuffle whenever content is injected
var _origBuildContent = buildContent;
buildContent = function() {
  _origBuildContent();
  setTimeout(function(){
    shuffleMatchGrid(document.getElementById('content'));
  }, 0);
};

</script>
